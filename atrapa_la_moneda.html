// MAIN LOOP
// ─────────────────────────────────────────────────────────────────
let lastTime=0;
function loop(ts) {
  const dt=Math.min(ts-lastTime,50); lastTime=ts;
  const tick=ts;
  update(dt,tick);
  draw(tick);
  requestAnimationFrame(loop);
}

function update(dt, tick) {
  // effects decay always (so flash works from any screen)
  for(const ef of efectosPantalla) ef.timer-=dt;
  efectosPantalla=efectosPantalla.filter(ef=>ef.timer>0);

  // cursor blink for name screen
  nombreCursorTimer += dt;
  if(nombreCursorTimer > 500) { nombreCursor = !nombreCursor; nombreCursorTimer = 0; }

  if(enNombreScreen || enLeaderboard || enSettings || enMenu) return;

  if(mundoGanado) {
    transTimer+=dt;
    if(transTimer>2800) { mundoGanado=false; transTimer=0; }
    return;
  }
  if(gameOver) return;

  const {jug,muros} = estado;

  // player movement
  let dxi=0, dyi=0;
  if(keys['ArrowLeft']||keys['KeyA']) dxi-=1;
  if(keys['ArrowRight']||keys['KeyD']) dxi+=1;
  if(keys['ArrowUp']||keys['KeyW']) dyi-=1;
  if(keys['ArrowDown']||keys['KeyS']) dyi+=1;
  // joystick override (only if no keyboard)
  if(JOY.active && dxi===0 && dyi===0) {
    if(Math.abs(JOY.dx)>0.15) dxi=JOY.dx;
    if(Math.abs(JOY.dy)>0.15) dyi=JOY.dy;
  }
  if(jug.efectos.confuso>0) { dxi=-dxi; dyi=-dyi; }
  if(jug.efectos.paralizado<=0) {
    const nx=Math.max(0,Math.min(W-jug.tam,jug.x+dxi*jug.vel));
    const ny=Math.max(0,Math.min(H-jug.tam,jug.y+dyi*jug.vel));
    const blocked=muros.some(m=>nx<m.x+m.w&&nx+jug.tam>m.x&&ny<m.y+m.h&&ny+jug.tam>m.y);
    if(!blocked) { jug.x=nx; jug.y=ny; }
  }
  // effects decay
  for(const k of ['lento','paralizado','confuso']) { jug.efectos[k]=Math.max(0,jug.efectos[k]-dt); }
  jug.vel=jug.velBase*(jug.efectos.lento>0?0.4:1.0);
  if(slowmoActivo>0) { slowmoActivo=Math.max(0,slowmoActivo-dt); }
  if(imuneActivo>0)  { imuneActivo=Math.max(0,imuneActivo-dt); }
  if(magnetActivo>0) { magnetActivo=Math.max(0,magnetActivo-dt); }
  if(supvelActivo>0) {
    supvelActivo=Math.max(0,supvelActivo-dt);
    if(supvelActivo<=0) { jug.velBase=Math.max(5,jug.velBase-4); } // restore
  }
  const slowFactor = slowmoActivo>0 ? 0.35 : 1.0;

  // hold-R reset in shop
  if(enShop && keys['KeyR']) {
    resetHoldTimer+=dt;
    if(resetHoldTimer>=5000) { resetProfile(); resetHoldTimer=0; }
  } else { resetHoldTimer=0; }

  // trail particles
  trailParts.push({x:jug.x+jug.tam/2, y:jug.y+jug.tam/2, age:0, maxAge:300, skin:skinActual});
  trailParts=trailParts.filter(p=>{ p.age+=dt; return p.age<p.maxAge; });

  // spawn/death FX timers
  if(spawnFX) { spawnFX.timer-=dt; if(spawnFX.timer<=0) spawnFX=null; }
  if(deathFX) { deathFX.timer-=dt; if(deathFX.timer<=0) deathFX=null; }

  // magnet: pull nearby coins toward player
  if(magnetActivo>0) {
    const mcx=jug.x+jug.tam/2, mcy=jug.y+jug.tam/2;
    const mnx=estado.mon.x+13, mny=estado.mon.y+13;
    const md=Math.hypot(mcx-mnx,mcy-mny);
    if(md>20&&md<300) {
      estado.mon.x+=((mcx-mnx)/md)*3;
      estado.mon.y+=((mcy-mny)/md)*3;
    }
  }

  // coin pickup
  const {mon} = estado;
  if(jug.x<mon.x+26&&jug.x+jug.tam>mon.x&&jug.y<mon.y+26&&jug.y+jug.tam>mon.y) {
    estado.monMundo++;
    puntosTotales++;
    const earned = x2CoinsActivo?2:1;
    monedasAcumuladas+=earned; saveCoins(monedasAcumuladas);
    if(estado.monMundo>=MONEDAS_POR_MUNDO) {
      const prevEscudo = estado.jug.escudo;
      const prevVelBase = estado.jug.velBase;
      mundoGanado=true; mundoActual++;
      estado=iniciarMundo(mundoActual,dificultad);
      // preserve purchased upgrades
      estado.jug.escudo = prevEscudo;
      estado.jug.velBase = prevVelBase;
      estado.jug.vel = prevVelBase;
      spawnTimer=0; enesTotalesSpawn=0; efectosPantalla=[];
    } else {
      const [cx,cy]=posAleatoria(26,muros,[jug.x,jug.y]);
      estado.mon={x:cx,y:cy};
    }
  }

  // powerup pickup
  estado.powerups=estado.powerups.filter(pu=>pu.vida>0);
  for(let pi=estado.powerups.length-1;pi>=0;pi--) {
    const pu=estado.powerups[pi];
    if(jug.x<pu.x+pu.r*2&&jug.x+jug.tam>pu.x&&jug.y<pu.y+pu.r*2&&jug.y+jug.tam>pu.y) {
      jug.escudo=true;
      efectosPantalla.push({tipo:'flash',timer:300,color:[80,200,255]});
      estado.powerups.splice(pi,1);
    }
    pu.vida-=dt;
  }

  // spawn enemies
  spawnTimer+=dt;
  if(spawnTimer>estado.params.spawnMs) {
    spawnTimer=0;
    const cantidad=1+Math.floor(estado.monMundo/4);
    const antes=estado.enes.length;
    for(let i=0;i<cantidad;i++) estado.enes.push(nuevoEnemigo(estado.params,muros,[jug.x,jug.y]));
    const nuevos=estado.enes.length-antes;
    const prevUmbral=Math.floor(enesTotalesSpawn/POWERUP_CADA_ENES);
    enesTotalesSpawn+=nuevos;
    const newUmbral=Math.floor(enesTotalesSpawn/POWERUP_CADA_ENES);
    if(newUmbral>prevUmbral && estado.enes.length>0) {
      estado.powerups.push(crearPowerup(estado.enes,muros));
    }
  }

  // enemy logic
  const jcx=jug.x+jug.tam/2, jcy=jug.y+jug.tam/2;
  const nuevasBalas=[], enesVivos=[];
  let perderVida=false;

  for(const e of estado.enes) {
    const edx=jug.x-e.x, edy=jug.y-e.y;
    const dist=Math.hypot(edx,edy)||1;
    const ecx=e.x+e.tam/2, ecy=e.y+e.tam/2;
    const eVel=e.vel*slowFactor;  // slowmo powerup reduces enemy speed

    if(e.tipo==='perseguidor') {
      const nx2=e.x+eVel*edx/dist, ny2=e.y+eVel*edy/dist;
      const blocked=muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y);
      if(!blocked){e.x=nx2;e.y=ny2;}

    } else if(e.tipo==='pistolero') {
      const obj=200, fac=dist>obj+20?0.6:(dist<obj-20?-0.4:0);
      const nx2=e.x+e.vel*fac*edx/dist, ny2=e.y+e.vel*fac*edy/dist;
      const blocked=muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y);
      if(!blocked){e.x=nx2;e.y=ny2;}
      e.disparoTimer-=dt;
      if(e.disparoTimer<=0) {
        e.disparoTimer=1500+Math.random()*1500;
        const ang2=Math.atan2(edy,edx);
        nuevasBalas.push({x:ecx,y:ecy,vx:estado.params.velBala*Math.cos(ang2),vy:estado.params.velBala*Math.sin(ang2),vida:3000});
      }

    } else if(e.tipo==='bomba') {
      if(!e.bombaExplotando) {
        const nx2=e.x+e.vel*0.8*edx/dist, ny2=e.y+e.vel*0.8*edy/dist;
        const blocked=muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y);
        if(!blocked){e.x=nx2;e.y=ny2;}
        if(dist<90) e.bombaCarga+=dt*2; else e.bombaCarga=Math.max(0,e.bombaCarga-dt*0.5);
        if(e.bombaCarga>=450) {
          e.bombaExplotando=true; e.bombaRadio=0; e.bombaTimer=350;
          efectosPantalla.push({tipo:'flash',timer:200,color:[255,140,0]});
        }
      } else {
        e.bombaTimer-=dt; e.bombaRadio=Math.min(110,e.bombaRadio+dt*1.0);
        if(Math.hypot(jcx-ecx,jcy-ecy)<e.bombaRadio) perderVida=true;
        if(e.bombaTimer<=0) continue;
      }

    } else if(e.tipo==='fantasma') {
      if(!e.rayoActivo) {
        const velf=e.vel*1.1;
        e.x=Math.max(0,Math.min(W-e.tam,e.x+velf*edx/dist));
        e.y=Math.max(0,Math.min(H-e.tam,e.y+velf*edy/dist));
      }
      e.rayoTimer-=dt;
      if(e.rayoTimer<=0 && dist<120) {
        e.rayoActivo=true; e.rayoTimer2=1500;
        e.rayoTimer=6000+Math.random()*4000;
        if(jug.escudo) {
          jug.escudo=false;
          efectosPantalla.push({tipo:'flash',timer:400,color:[80,200,255]});
        } else if(imuneActivo<=0) {
          jug.efectos.paralizado=Math.max(jug.efectos.paralizado,1500);
        }
      }
      if(e.rayoActivo) { e.rayoTimer2-=dt; if(e.rayoTimer2<=0) e.rayoActivo=false; }

    } else if(e.tipo==='espejo') {
      const angOrb=tick/1200+e.x*0.01, radioOrb=160;
      const tx=jcx+Math.cos(angOrb)*radioOrb-e.tam/2;
      const ty=jcy+Math.sin(angOrb)*radioOrb-e.tam/2;
      const ddx=tx-e.x, ddy=ty-e.y, dl=Math.hypot(ddx,ddy)||1;
      const nx2=e.x+e.vel*0.7*ddx/dl;
      const ny2=e.y+e.vel*0.7*ddy/dl;
      const blocked=muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y);
      if(!blocked) {
        e.x=Math.max(0,Math.min(W-e.tam,nx2));
        e.y=Math.max(0,Math.min(H-e.tam,ny2));
      }
      e.escudoTimer-=dt;
      if(e.escudoTimer<=0 && dist<180) {
        if(jug.escudo) {
          jug.escudo=false;
          efectosPantalla.push({tipo:'flash',timer:400,color:[80,200,255]});
        } else if(imuneActivo<=0) {
          jug.efectos.confuso=Math.max(jug.efectos.confuso,2500);
        }
        e.escudoTimer=3000+Math.random()*2000;
      }

    } else if(e.tipo==='sniper') {
      // Stays far away and charges a laser shot
      const objDist=280;
      const fac=dist>objDist+30?0.5:(dist<objDist-30?-0.4:0);
      const nx2=e.x+e.vel*fac*edx/dist, ny2=e.y+e.vel*fac*edy/dist;
      if(!muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y)){e.x=nx2;e.y=ny2;}
      e.sniperTimer-=dt;
      if(e.sniperTimer>0) {
        e.sniperCargando=0; e.sniperLaser=null;
      } else {
        e.sniperCargando=Math.min(1,((-e.sniperTimer)/1200));
        if(e.sniperCargando>=1) {
          // fire 3 rapid bullets in a spread
          for(let si=-1;si<=1;si++) {
            const ang2=Math.atan2(edy,edx)+si*0.12;
            nuevasBalas.push({x:ecx,y:ecy,vx:estado.params.velBala*1.4*Math.cos(ang2),vy:estado.params.velBala*1.4*Math.sin(ang2),vida:2500,sniper:true});
          }
          e.sniperTimer=2500+Math.random()*2000;
          e.sniperCargando=0; e.sniperLaser=null;
        } else {
          e.sniperLaser={x1:ecx,y1:ecy,x2:jcx,y2:jcy,pct:e.sniperCargando};
        }
      }

    } else if(e.tipo==='divisor') {
      // Chases player; when killed, splits into 2 smaller ones
      const nx2=e.x+e.vel*edx/dist, ny2=e.y+e.vel*edy/dist;
      if(!muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y)){e.x=nx2;e.y=ny2;}

    } else if(e.tipo==='curandero') {
      // Stays behind other enemies and periodically heals nearest ally (prevents bomb timer from decaying)
      const nx2=e.x+e.vel*0.6*edx/dist, ny2=e.y+e.vel*0.6*edy/dist;
      if(!muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y)){e.x=nx2;e.y=ny2;}
      e.curaTimer-=dt;
      if(e.curaTimer<=0) {
        e.curaTimer=3000+Math.random()*2000;
        // heal nearest bomb ally: reset its carga
        for(const ally of estado.enes) {
          if(ally!==e && ally.tipo==='bomba') { ally.bombaCarga=0; break; }
        }
      }

    } else if(e.tipo==='iman') {
      // Periodically activates a pull that drags the player towards it
      const nx2=e.x+e.vel*edx/dist, ny2=e.y+e.vel*edy/dist;
      if(!muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y)){e.x=nx2;e.y=ny2;}
      e.imanTimer-=dt;
      if(e.imanTimer<=0 && !e.imanActivo) {
        e.imanActivo=true; e.imanTimer2=2000; e.imanTimer=5000+Math.random()*3000;
      }
      if(e.imanActivo) {
        e.imanTimer2-=dt;
        if(e.imanTimer2<=0) e.imanActivo=false;
        else if(jug.efectos.paralizado<=0) {
          // pull player toward iman
          const pullStr=1.8;
          const pnx=Math.max(0,Math.min(W-jug.tam,jug.x+(ecx-jcx)/dist*pullStr));
          const pny=Math.max(0,Math.min(H-jug.tam,jug.y+(ecy-jcy)/dist*pullStr));
          if(!muros.some(m=>pnx<m.x+m.w&&pnx+jug.tam>m.x&&pny<m.y+m.h&&pny+jug.tam>m.y)){jug.x=pnx;jug.y=pny;}
        }
      }

    } else if(e.tipo==='tele') {
      const nx2=e.x+e.vel*edx/dist, ny2=e.y+e.vel*edy/dist;
      if(!muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y)){e.x=nx2;e.y=ny2;}
      e.teleTimer-=dt;
      if(e.teleTimer<=0) {
        e.teleTimer=4000+Math.random()*3000;
        efectosPantalla.push({tipo:'flash',timer:200,color:[255,170,0]});
        for(let ti=0;ti<30;ti++) {
          const ang3=Math.random()*Math.PI*2, r3=60+Math.random()*90;
          const tx3=jcx+Math.cos(ang3)*r3-e.tam/2, ty3=jcy+Math.sin(ang3)*r3-e.tam/2;
          if(posValida(tx3,ty3,e.tam,muros,0)&&tx3>0&&tx3<W-e.tam&&ty3>0&&ty3<H-e.tam){
            e.x=tx3; e.y=ty3; break;
          }
        }
      }

    } else if(e.tipo==='escudador') {
      // Orbits the nearest ally and projects a shield bubble around it
      // Move toward nearest non-escudador ally
      let nearest=null, nearestD=Infinity;
      for(const ally of estado.enes) {
        if(ally===e || ally.tipo==='escudador') continue;
        const d=Math.hypot(e.x-ally.x, e.y-ally.y);
        if(d<nearestD) { nearestD=d; nearest=ally; }
      }
      if(nearest) {
        const tdx=nearest.x-e.x, tdy=nearest.y-e.y, td=Math.hypot(tdx,tdy)||1;
        const orbit=50, fac= td>orbit+10?0.8:(td<orbit-10?-0.5:0);
        const nx2=e.x+e.vel*fac*tdx/td, ny2=e.y+e.vel*fac*tdy/td;
        if(!muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y)){e.x=nx2;e.y=ny2;}
        e.aliado_escudado=nearest;
      } else {
        // drift toward player if no allies
        const nx2=e.x+e.vel*0.5*edx/dist, ny2=e.y+e.vel*0.5*edy/dist;
        if(!muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y)){e.x=nx2;e.y=ny2;}
        e.aliado_escudado=null;
      }
      // The ally it shields: block bullet hits on the ally
      if(e.aliado_escudado) {
        const shR=40;
        const sx=e.aliado_escudado.x+e.aliado_escudado.tam/2;
        const sy=e.aliado_escudado.y+e.aliado_escudado.tam/2;
        estado.balas=estado.balas.filter(b=>{
          if(Math.hypot(b.x-sx,b.y-sy)<shR) return false; // absorbed
          return true;
        });
      }

    } else if(e.tipo==='torreta') {
      // Stationary. Fires bursts of 4 bullets in a cross every few seconds.
      // Does not move (overrides velocity to 0 effectively)
      e.torretaTimer-=dt;
      if(e.torretaTimer<=0) {
        e.torretaTimer=2000+Math.random()*1500;
        for(let bi=0;bi<4;bi++) {
          const ang4=bi*Math.PI/2;
          nuevasBalas.push({x:ecx,y:ecy,vx:estado.params.velBala*Math.cos(ang4),vy:estado.params.velBala*Math.sin(ang4),vida:3000});
        }
        // also fire aimed shot at player
        const aimAng=Math.atan2(edy,edx);
        nuevasBalas.push({x:ecx,y:ecy,vx:estado.params.velBala*1.2*Math.cos(aimAng),vy:estado.params.velBala*1.2*Math.sin(aimAng),vida:3000});
      }

    } else if(e.tipo==='berserker') {
      // Gets angrier (faster) the closer it is to the player
      e.enojo=Math.min(1, e.enojo + (dist<150?(dt/1000):-(dt/2000)));
      e.enojo=Math.max(0,e.enojo);
      const berVel=e.vel*(1+e.enojo*2.5)*eVel/e.vel;
      const nx2=e.x+berVel*edx/dist, ny2=e.y+berVel*edy/dist;
      if(!muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y)){e.x=nx2;e.y=ny2;}

    } else if(e.tipo==='vampiro') {
      // Approaches player; when close, drains their speed for a few seconds
      const nx2=e.x+e.vel*0.9*edx/dist, ny2=e.y+e.vel*0.9*edy/dist;
      if(!muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y)){e.x=nx2;e.y=ny2;}
      e.vampTimer-=dt;
      if(e.vampTimer<=0&&dist<100) {
        e.vampTimer=4000+Math.random()*2000;
        e.robando=true; e.vampTimer2=1500;
        jug.efectos.lento=Math.max(jug.efectos.lento,3000);
        efectosPantalla.push({tipo:'flash',timer:300,color:[120,0,30]});
      }
      if(e.robando) { e.vampTimer2-=dt; if(e.vampTimer2<=0) e.robando=false; }

    } else if(e.tipo==='ninja') {
      // Periodically dashes fast toward player then turns invisible for a moment
      e.ninjaTimer-=dt;
      if(e.ninjaTimer<=0 && !e.invisible) {
        e.ninjaTimer=3500+Math.random()*2000;
        // dash: set high velocity burst
        const dashSpd=e.vel*8;
        e.dashVx=dashSpd*edx/dist; e.dashVy=dashSpd*edy/dist;
        e.invisible=true; e.ninjaTimer2=800;
      }
      if(e.invisible) {
        e.ninjaTimer2-=dt;
        if(e.ninjaTimer2<=0) { e.invisible=false; e.dashVx=0; e.dashVy=0; }
        // move with dash velocity
        const dnx=e.x+e.dashVx*dt/1000*60, dny=e.y+e.dashVy*dt/1000*60;
        if(!muros.some(m=>dnx<m.x+m.w&&dnx+e.tam>m.x&&dny<m.y+m.h&&dny+e.tam>m.y)){
          e.x=Math.max(0,Math.min(W-e.tam,dnx));
          e.y=Math.max(0,Math.min(H-e.tam,dny));
        }
      } else {
        const nx2=e.x+e.vel*edx/dist, ny2=e.y+e.vel*edy/dist;
        if(!muros.some(m=>nx2<m.x+m.w&&nx2+e.tam>m.x&&ny2<m.y+m.h&&ny2+e.tam>m.y)){e.x=nx2;e.y=ny2;}
      }
    }
    enesVivos.push(e);
  }
  estado.enes=enesVivos;
  estado.balas.push(...nuevasBalas);

  // move bullets
  const balasVivas=[];
  for(const b of estado.balas) {
    b.x+=b.vx; b.y+=b.vy; b.vida-=dt;
    if(b.vida<=0||b.x<0||b.x>W||b.y<0||b.y>H) continue;
    let reflejo=false;
    for(const e of estado.enes) {
      if(e.tipo==='espejo'&&b.x>e.x&&b.x<e.x+e.tam&&b.y>e.y&&b.y<e.y+e.tam) {
        b.vx=-b.vx; b.vy=-b.vy; b.vida=Math.min(b.vida,1500); reflejo=true; break;
      }
    }
    if(reflejo){balasVivas.push(b);continue;}
    if(muros.some(m=>b.x>m.x&&b.x<m.x+m.w&&b.y>m.y&&b.y<m.y+m.h)) continue;
    balasVivas.push(b);
  }
  estado.balas=balasVivas;

  // bullet hits player (slows, unless shield active)
  estado.balas=estado.balas.filter(b=>{
    if(b.x>jug.x&&b.x<jug.x+jug.tam&&b.y>jug.y&&b.y<jug.y+jug.tam) {
      if(jug.escudo) {
        jug.escudo=false;
        efectosPantalla.push({tipo:'flash',timer:400,color:[80,200,255]});
      } else {
        jug.efectos.lento=Math.max(jug.efectos.lento,2000);
      }
      return false;
    }
    return true;
  });

  // enemy body collision
  const yaInvencible=efectosPantalla.some(ef=>ef.tipo==='vida_perdida');
  if(!perderVida&&!yaInvencible) {
    for(const e of estado.enes) {
      if(e.tipo==='bomba'&&e.bombaExplotando) continue;
      if(jug.x<e.x+e.tam&&jug.x+jug.tam>e.x&&jug.y<e.y+e.tam&&jug.y+jug.tam>e.y) {
        perderVida=true; break;
      }
    }
  }

  // apply life loss (skipped in admin mode — infinite lives)
  if(perderVida&&!adminMode&&!efectosPantalla.some(ef=>ef.tipo==='vida_perdida')) {
    if(jug.escudo) {
      jug.escudo=false;
      efectosPantalla.push({tipo:'flash',timer:400,color:[80,200,255]});
    } else {
      vidas--;
      deathFX={x:jug.x+jug.tam/2, y:jug.y+jug.tam/2, timer:600, skin:skinActual};
      efectosPantalla.push({tipo:'vida_perdida',timer:800,color:[220,50,50]});
      estado.enes=[]; estado.balas=[]; estado.powerups=[]; spawnTimer=0;
      jug.efectos={lento:0,paralizado:0,confuso:0}; jug.vel=jug.velBase;
      if(vidas<=0) {
        if(reviveActivo) {
          reviveActivo=false; vidas=1;
          efectosPantalla.push({tipo:'flash',timer:600,color:[255,215,0]});
          const [rx,ry]=posAleatoria(jug.tam,muros,null,0);
          jug.x=rx; jug.y=ry;
          spawnFX={x:jug.x+jug.tam/2, y:jug.y+jug.tam/2, timer:800, skin:skinActual};
        } else {
          gameOver=true;
          if(puntosTotales>highScore) { highScore=puntosTotales; saveHS(highScore); }
          if(nombreJugador) submitScore(nombreJugador, puntosTotales, dificultad);
        }
      } else {
        const [rx,ry]=posAleatoria(jug.tam,muros,null,0);
        jug.x=rx; jug.y=ry;
        spawnFX={x:jug.x+jug.tam/2, y:jug.y+jug.tam/2, timer:800, skin:skinActual};
      }
    }
  }

  // (efectosPantalla decay handled at top of update)
}

function draw(tick) {
  ctx.clearRect(0,0,W,H);

  // Name entry screen — always shown first until name set
  if(enNombreScreen) { drawNombreScreen(tick); return; }
  // Leaderboard screen
  if(enLeaderboard) { drawLeaderboard(tick); return; }

  if(enShop) {
    drawShop(shopSel,shopScroll,tick);
    // admin flash over shop too
    for(const ef of efectosPantalla) {
      if(ef.tipo==='flash') {
        const pct=Math.min(1,ef.timer/500);
        ctx.fillStyle=`rgba(${ef.color[0]},${ef.color[1]},${ef.color[2]},${0.5*pct})`;
        ctx.fillRect(0,0,W,H);
      }
    }
    if(adminMode) { ctx.fillStyle='rgba(255,200,0,0.18)'; ctx.fillRect(0,0,W,22); ctx.fillStyle='#ffd700'; ctx.font='bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('ADMIN MODE ACTIVO',W/2,11); ctx.textAlign='left'; ctx.textBaseline='alphabetic'; }
    return;
  }
  if(enSettings) {
    drawSettings(opcionIdioma,scrollIdioma,tick);
    if(adminMode) { ctx.fillStyle='rgba(255,200,0,0.18)'; ctx.fillRect(0,0,W,22); ctx.fillStyle='#ffd700'; ctx.font='bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('ADMIN MODE ACTIVO',W/2,11); ctx.textAlign='left'; ctx.textBaseline='alphabetic'; }
    return;
  }
  if(enMenu) {
    drawMenu(opcionMenu,tick,highScore);
    for(const ef of efectosPantalla) {
      if(ef.tipo==='flash') {
        const pct=Math.min(1,ef.timer/500);
        ctx.fillStyle=`rgba(${ef.color[0]},${ef.color[1]},${ef.color[2]},${0.5*pct})`;
        ctx.fillRect(0,0,W,H);
      }
    }
    if(adminMode) { ctx.fillStyle='rgba(255,200,0,0.22)'; ctx.fillRect(0,0,W,22); ctx.fillStyle='#ffd700'; ctx.font='bold 13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('ADMIN MODE ACTIVO  |  Inicia una ronda para usar los atajos',W/2,11); ctx.textAlign='left'; ctx.textBaseline='alphabetic'; }
    return;
  }

  const {jug,mon,enes,muros,balas,params,powerups,monMundo} = estado;
  drawFondo(mundoActual,tick);

  // screen flash
  for(const ef of efectosPantalla) {
    if(ef.tipo==='flash'||ef.tipo==='vida_perdida') {
      const dur=ef.tipo==='flash'?200:800;
      const pct=Math.min(1,ef.timer/dur);
      ctx.fillStyle=`rgba(${ef.color[0]},${ef.color[1]},${ef.color[2]},${(0.43*pct).toFixed(2)})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  for(const m of muros) drawMuro(m,mundoActual);
  drawMoneda(mon.x,mon.y,tick);
  for(const pu of powerups) drawPowerupEscudo(pu,tick);
  for(const b of balas) drawBala(b.x,b.y,b.vx,b.vy);

  const jcx2=jug.x+jug.tam/2, jcy2=jug.y+jug.tam/2;
  for(const e of enes) {
    const ecx2=e.x+e.tam/2, ecy2=e.y+e.tam/2;
    if(e.tipo==='perseguidor') drawPerseguidor(e.x,e.y,e.tam,tick);
    else if(e.tipo==='pistolero') drawPistolero(e.x,e.y,e.tam,jcx2,jcy2,tick);
    else if(e.tipo==='bomba') {
      if(e.bombaExplotando) drawExplosion(ecx2,ecy2,e.bombaRadio,Math.max(0,e.bombaTimer/350));
      else drawBomba(e.x,e.y,e.tam,tick,e.bombaCarga>0.05,Math.min(1,e.bombaCarga/900));
    }
    else if(e.tipo==='fantasma') { drawFantasma(e.x,e.y,e.tam,tick); if(e.rayoActivo) drawRayo(ecx2,ecy2,jcx2,jcy2,tick); }
    else if(e.tipo==='espejo') drawEspejo(e.x,e.y,e.tam,tick);
    else if(e.tipo==='sniper') drawSniper(e.x,e.y,e.tam,tick,e.sniperCargando,e.sniperLaser);
    else if(e.tipo==='divisor') drawDivisor(e.x,e.y,e.tam,tick);
    else if(e.tipo==='curandero') drawCurandero(e.x,e.y,e.tam,tick);
    else if(e.tipo==='iman') drawIman(e.x,e.y,e.tam,tick,e.imanActivo);
    else if(e.tipo==='tele') drawTele(e.x,e.y,e.tam,tick);
    else if(e.tipo==='escudador') {
      const ax=e.aliado_escudado?e.aliado_escudado.x+e.aliado_escudado.tam/2:null;
      const ay=e.aliado_escudado?e.aliado_escudado.y+e.aliado_escudado.tam/2:null;
      drawEscudador(e.x,e.y,e.tam,tick,ax,ay);
    }
    else if(e.tipo==='torreta') drawTorreta(e.x,e.y,e.tam,tick,ecx2,ecy2,jcx2,jcy2,e.torretaTimer,3500);
    else if(e.tipo==='berserker') drawBerserker(e.x,e.y,e.tam,tick,e.enojo);
    else if(e.tipo==='vampiro') {
      drawVampiro(e.x,e.y,e.tam,tick,e.robando);
      if(e.robando) {
        ctx.strokeStyle=`rgba(180,0,40,0.6)`; ctx.lineWidth=2; ctx.setLineDash([5,3]);
        ctx.beginPath(); ctx.moveTo(ecx2,ecy2); ctx.lineTo(jcx2,jcy2); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    else if(e.tipo==='ninja') drawNinja(e.x,e.y,e.tam,tick,e.invisible);
  }
  // Trail
  for(const p of trailParts) {
    const pct=1-p.age/p.maxAge;
    if(pct<0.05) continue;
    let trailCol;
    switch(p.skin) {
      case 'fire':   trailCol=`rgba(255,${Math.round(80+100*pct)},0,${pct*0.5})`; break;
      case 'ice':    trailCol=`rgba(128,${Math.round(200+55*pct)},255,${pct*0.4})`; break;
      case 'dark':   trailCol=`rgba(140,40,255,${pct*0.45})`; break;
      case 'neon':   trailCol=`rgba(0,255,${Math.round(100+155*pct)},${pct*0.5})`; break;
      case 'ghost':  trailCol=`rgba(200,210,255,${pct*0.3})`; break;
      case 'c':      trailCol=`rgba(255,${Math.round(180+75*pct)},0,${pct*0.5})`; break;
      case 'plasma': trailCol=`rgba(255,64,255,${pct*0.5})`; break;
      case 'void':   trailCol=`rgba(80,0,160,${pct*0.4})`; break;
      default:       trailCol=`rgba(220,50,50,${pct*0.25})`; break;
    }
    const tr=Math.max(2,(jug.tam/2)*pct*0.7);
    ctx.beginPath(); ctx.arc(p.x,p.y,tr,0,Math.PI*2); ctx.fillStyle=trailCol; ctx.fill();
  }

  // Death FX burst
  if(deathFX) {
    const pct=deathFX.timer/600;
    const r2=30+70*(1-pct);
    let dCol;
    switch(deathFX.skin) {
      case 'fire':   dCol=[255,100,0]; break;
      case 'ice':    dCol=[128,220,255]; break;
      case 'dark':   dCol=[160,40,255]; break;
      case 'neon':   dCol=[0,255,136]; break;
      case 'plasma': dCol=[255,64,255]; break;
      case 'void':   dCol=[80,0,160]; break;
      default:       dCol=[220,50,50];
    }
    for(let i=0;i<12;i++) {
      const a=i*Math.PI/6+(1-pct)*3;
      const pr=r2*0.5+r2*0.5*Math.sin(pct*Math.PI);
      ctx.beginPath(); ctx.arc(deathFX.x+Math.cos(a)*pr,deathFX.y+Math.sin(a)*pr,4*pct,0,Math.PI*2);
      ctx.fillStyle=`rgba(${dCol[0]},${dCol[1]},${dCol[2]},${pct*0.8})`; ctx.fill();
    }
    const gr2=ctx.createRadialGradient(deathFX.x,deathFX.y,0,deathFX.x,deathFX.y,r2);
    gr2.addColorStop(0,`rgba(${dCol[0]},${dCol[1]},${dCol[2]},${pct*0.4})`);
    gr2.addColorStop(1,`rgba(${dCol[0]},${dCol[1]},${dCol[2]},0)`);
    ctx.beginPath(); ctx.arc(deathFX.x,deathFX.y,r2,0,Math.PI*2); ctx.fillStyle=gr2; ctx.fill();
  }

  // Spawn FX rings
  if(spawnFX) {
    const pct=1-spawnFX.timer/800;
    const r3=8+50*pct;
    let sCol;
    switch(spawnFX.skin) {
      case 'fire':   sCol='255,100,0'; break;
      case 'ice':    sCol='128,220,255'; break;
      case 'dark':   sCol='160,40,255'; break;
      case 'neon':   sCol='0,255,136'; break;
      case 'plasma': sCol='255,64,255'; break;
      case 'void':   sCol='80,0,160'; break;
      default:       sCol='255,215,0';
    }
    ctx.strokeStyle=`rgba(${sCol},${1-pct})`; ctx.lineWidth=3*(1-pct)+1;
    ctx.beginPath(); ctx.arc(spawnFX.x,spawnFX.y,r3,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle=`rgba(${sCol},${(1-pct)*0.5})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(spawnFX.x,spawnFX.y,r3*0.6,0,Math.PI*2); ctx.stroke();
  }

  drawJugador(jug,tick);
  drawJoystick(tick);

  // HUD — coin progress bar
  const bw=300, bh=18, bx=W/2-bw/2, byh=10;
  ctx.fillStyle='rgba(40,40,50,0.9)'; roundRect(bx,byh,bw,bh,6); ctx.fill();
  if(monMundo>0) {
    const prog=Math.round(bw*monMundo/MONEDAS_POR_MUNDO);
    ctx.fillStyle='#ffd700'; roundRect(bx,byh,prog,bh,6); ctx.fill();
  }
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1; roundRect(bx,byh,bw,bh,6); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(`${monMundo}/${MONEDAS_POR_MUNDO} ${T('monedas_hud')}`,W/2,byh+9);

  // HUD left
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillStyle='#3cc850'; ctx.font='bold 22px monospace'; ctx.fillText(`${T('mundo')} ${mundoActual}`,12,10);
  ctx.fillStyle='#fff'; ctx.font='bold 22px monospace'; ctx.fillText(`${T('total')}: ${puntosTotales}`,12,36);
  const difCols={facil:'#3cc850',normal:'#ffd700',dificil:'#dc3232'};
  ctx.fillStyle=difCols[dificultad]||'#fff'; ctx.font='14px monospace';
  ctx.fillText(T(dificultad+'_nom'),12,64);
  const hsCol=puntosTotales>=highScore&&puntosTotales>0?'#ffc800':'rgba(180,160,60,0.7)';
  ctx.fillStyle=hsCol; ctx.fillText(`${T('high_score')}: ${highScore}`,12,82);

  // HUD right enemies
  ctx.textAlign='right'; ctx.fillStyle='rgba(200,200,200,0.8)'; ctx.font='14px monospace';
  ctx.fillText(`${T('enemigos')}: ${enes.length}`,W-10,14);

  // hearts
  for(let i=0;i<3;i++) drawCorazon(22+i*34,H-20,12,i<vidas?'#dc3232':'rgba(60,30,30,0.8)');
  ctx.fillStyle='#fff'; ctx.font='13px monospace'; ctx.textAlign='left';
  ctx.fillText(`x${vidas}`,12+3*34+6,H-28);

  // shield status
  if(jug.escudo) {
    const sh=T('escudo');
    ctx.fillStyle='#50c8ff'; ctx.font='bold 16px monospace'; ctx.textAlign='center';
    ctx.fillText(sh,W/2,H-50);
  }

  // Active powerup icons (top right area)
  const activeIcons=[];
  if(imuneActivo>0)  activeIcons.push({ico:'⭐',pct:imuneActivo/10000,col:'#ffd700'});
  if(magnetActivo>0) activeIcons.push({ico:'🧲',pct:magnetActivo/15000,col:'#e040fb'});
  if(supvelActivo>0) activeIcons.push({ico:'🚀',pct:supvelActivo/8000,col:'#ff8c00'});
  if(x2CoinsActivo)  activeIcons.push({ico:'💰',pct:1,col:'#ffd700'});
  if(slowmoActivo>0) activeIcons.push({ico:'⏱',pct:slowmoActivo/5000,col:'#00dcdc'});
  if(reviveActivo)   activeIcons.push({ico:'💎',pct:1,col:'#ff80ff'});
  ctx.textAlign='right'; ctx.textBaseline='middle';
  for(let ai=0;ai<activeIcons.length;ai++) {
    const {ico,pct,col}=activeIcons[ai];
    const px=W-14, py=34+ai*26;
    ctx.font='16px serif'; ctx.fillText(ico,px,py);
    ctx.strokeStyle=col; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(px-24,py+10); ctx.lineTo(px-24+24*pct,py+10); ctx.stroke();
  }

  // reset hold progress (show in shop only, handled in draw via enShop)
  if(enShop && resetHoldTimer>100) {
    const pct=resetHoldTimer/5000;
    ctx.strokeStyle=`rgba(220,50,50,${0.4+pct*0.5})`; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(W/2,H-38,16,0,Math.PI*2*pct); ctx.stroke();
  }

  // status effects
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  let efy=40+(jug.escudo?22:0);
  if(jug.efectos.lento>0)     { ctx.fillStyle='#00dcdc'; ctx.font='bold 26px monospace'; ctx.fillText(T('vel_lenta'),W/2,H-efy); efy+=34; }
  if(jug.efectos.paralizado>0){ ctx.fillStyle='#9696ff'; ctx.font='bold 26px monospace'; ctx.fillText(T('paralizado'),W/2,H-efy); efy+=34; }
  if(jug.efectos.confuso>0)   { ctx.fillStyle='#ff64b4'; ctx.font='bold 26px monospace'; ctx.fillText(T('confuso'),W/2,H-efy); efy+=34; }

  // enemy legend bottom right
  ctx.textAlign='right'; ctx.textBaseline='alphabetic';
  const tipos=[...new Set(params.tipos)];
  let ly=H-14;
  for(let i=tipos.length-1;i>=0;i--) {
    const tipo=tipos[i];
    ctx.fillStyle=LEYENDA_COLORES[tipo]||'#fff'; ctx.font='11px monospace';
    ctx.fillText((TEXTOS['ene_'+tipo]||{}).es||tipo,W-10,ly); ly-=16;
  }

  // WORLD CLEARED overlay
  if(mundoGanado) {
    ctx.fillStyle='rgba(0,0,0,0.67)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#3cc850'; ctx.font='bold 60px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(T('mundo_sup'),W/2,H/2-60);
    ctx.fillStyle='#ffd700'; ctx.font='bold 30px monospace';
    ctx.fillText(`${T('bienvenido')} ${mundoActual}`,W/2,H/2);
    const nue=NUEVO_TIPO_MUNDO[mundoActual];
    if(nue) {
      ctx.fillStyle=LEYENDA_COLORES[nue]||'#fff'; ctx.font='18px monospace';
      const desc=(TEXTOS['ene_'+nue]||{}).es||nue;
      ctx.fillText(`${T('nuevo_ene')} ${desc}`,W/2,H/2+50);
    }
  }

  // GAME OVER overlay
  if(gameOver) {
    ctx.fillStyle='rgba(0,0,0,0.73)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#dc3232'; ctx.font='bold 64px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#ff0000'; ctx.shadowBlur=20;
    ctx.fillText(T('game_over'),W/2,H/2-80);
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font='18px monospace';
    ctx.fillText(`${T('mundo')} ${mundoActual}  |  ${puntosTotales} ${T('monedas_hud')}  |  ${T(dificultad+'_nom')}`,W/2,H/2);
    ctx.fillStyle='rgba(180,180,180,0.9)'; ctx.font='16px monospace';
    ctx.fillText(T('volver_menu'),W/2,H/2+46);
    ctx.fillStyle='rgba(255,200,0,0.7)'; ctx.font='14px monospace';
    ctx.fillText('TAB = Settings   |   Q = Tienda   |   L = Ranking',W/2,H/2+70);
    ctx.fillStyle='#ffc800'; ctx.font='15px monospace';
    ctx.fillText(`${T('high_score')}: ${highScore}`,W/2,H/2+92);
    for(let i=0;i<3;i++) drawCorazon(W/2-34+i*34,H/2+106,12,'rgba(60,30,30,0.8)');
  }
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';

  // ── ADMIN MODE HUD ──
  if(adminMode && !enMenu && !enShop && !enSettings) {
    // amber banner at top
    ctx.fillStyle='rgba(255,200,0,0.18)'; ctx.fillRect(0,0,W,22);
    ctx.fillStyle='#ffd700'; ctx.font='bold 13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(
      `ADMIN MODE  |  Mundo ${mundoActual}  |  6=sig mundo  4=ant mundo  1=matar enes  2=+50 coins  3=+vida  |  Escribe ${ADMIN_CODE} para salir`,
      W/2, 11
    );
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }
}

requestAnimationFrame(loop);
</script>
</body>
</html>
