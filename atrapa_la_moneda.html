  body {
    background: #050510;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
  }
  #wrap {
    position: relative;
    display: inline-block;
    line-height: 0;
  }
  #gameCanvas {
    display: block;
    border: 1px solid #223;
    width: 100vw;
    height: auto;
    max-height: 100vh;
    object-fit: contain;
  }
  /* Action buttons — always visible on touch devices */
  #action-btns {
    position: absolute;
    bottom: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }
  #action-btns button {
    pointer-events: all;
    background: rgba(255,215,0,0.18);
    border: 1px solid rgba(255,215,0,0.5);
    border-radius: 10px;
    color: #ffd700;
    padding: 10px 16px;
    font-size: 13px;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    touch-action: none;
    user-select: none;
    backdrop-filter: blur(4px);
  }
  #action-btns button:active { background: rgba(255,215,0,0.4); }
  @media (hover: hover) {
    /* Desktop: hide action buttons since keyboard works */
    #action-btns { display: none; }
  }
</style>
</head>

// ─────────────────────────────────────────────────────────────────
// RNG HELPER
// ─────────────────────────────────────────────────────────────────
function seededRng(seed) {
  let s = seed;
  return function() { s = (s*1664525 + 1013904223) & 0xffffffff; return (s>>>0)/0xffffffff; };
}
function randRange(rng, a, b) { return Math.floor(rng()*(b-a+1))+a; }

// ─────────────────────────────────────────────────────────────────
// WALL LOGIC
// ─────────────────────────────────────────────────────────────────
function crearMuros(mundo) {
  const rng = seededRng(mundo*9999+7);
  const ms = [];
  const n = Math.min(5+mundo, 12);
  for(let i=0;i<n;i++) {
    const w=randRange(rng,50,150), h=randRange(rng,20,90);
    const x=randRange(rng,0,W-w), y=randRange(rng,0,H-h);
    ms.push({x,y,w,h});
  }
  return ms;
}
function posValida(x,y,s,muros,margen=10) {
  if(x<0||y<0||x+s>W||y+s>H) return false;
  for(const m of muros) if(x-margen<m.x+m.w&&x+s+margen>m.x&&y-margen<m.y+m.h&&y+s+margen>m.y) return false;
  return true;
}
function posAleatoria(size, muros, excl=null, dist=150) {
  for(let i=0;i<600;i++) {
    const x=Math.floor(Math.random()*(W-size)), y=Math.floor(Math.random()*(H-size));
    if(!posValida(x,y,size,muros)) continue;
    if(excl && Math.hypot(x-excl[0],y-excl[1])<dist) continue;
    return [x,y];
  }
  for(let i=0;i<600;i++) {
    const x=Math.floor(Math.random()*(W-size)), y=Math.floor(Math.random()*(H-size));
    if(posValida(x,y,size,muros)) return [x,y];
  }
  const step=Math.max(size,20);
  for(let gx=0;gx<W-size;gx+=step) for(let gy=0;gy<H-size;gy+=step) if(posValida(gx,gy,size,muros)) return [gx,gy];
  return [10,10];
}

function paramsMundo(mundo, dificultad) {
  const mult = {facil:0.6,normal:1.0,dificil:1.5}[dificultad];
  return {
    velEne: (0.7+(mundo-1)*0.25)*mult,
    tamEne: Math.max(14, 28-(mundo-1)*2),
    velBala: (3.0+(mundo-1)*0.35)*mult,
    spawnMs: Math.max(1200, (5000-(mundo-1)*400)/mult),
    tipos: TIPOS_POR_MUNDO[mundo] || TIPOS_POR_MUNDO[5].slice()
  };
}
function nuevoEnemigo(p, muros, excl) {
  const [ex,ey] = posAleatoria(p.tamEne, muros, excl);
  const tipo = p.tipos[Math.floor(Math.random()*p.tipos.length)];
  return {
    x:ex, y:ey, vel:p.velEne, tam:p.tamEne, tipo,
    disparoTimer: 1200+Math.random()*1600,
    bombaCarga:0, bombaExplotando:false, bombaRadio:0, bombaTimer:0,
    rayoTimer: 5000+Math.random()*3000, rayoActivo:false, rayoTimer2:0,
    escudoTimer:0,

  };
}

// ─────────────────────────────────────────────────────────────────
// POWERUP
// ─────────────────────────────────────────────────────────────────
function centroDeMasa(enes) {
  if(!enes.length) return [W/2,H/2];
  return [enes.reduce((a,e)=>a+e.x+e.tam/2,0)/enes.length, enes.reduce((a,e)=>a+e.y+e.tam/2,0)/enes.length];
}
function crearPowerup(enes, muros) {
  const [cx,cy] = centroDeMasa(enes);
  const r=16;
  for(let radio=0;radio<200;radio+=20) {
    for(let t=0;t<20;t++) {
      const ang=Math.random()*Math.PI*2;
      const px=cx+Math.cos(ang)*radio-r, py=cy+Math.sin(ang)*radio-r;
      if(posValida(px,py,r*2,muros)) return {x:px,y:py,r,vida:8000};
    }
  }
  return {x:cx-r,y:cy-r,r,vida:8000};
}

// ─────────────────────────────────────────────────────────────────
// INIT WORLD
// ─────────────────────────────────────────────────────────────────
function iniciarMundo(mundo, dificultad) {
  const p = paramsMundo(mundo, dificultad);
  const muros = crearMuros(mundo);
  const [jx,jy] = posAleatoria(36,muros,null,0);
  const jug = {x:jx,y:jy,tam:36,velBase:5,vel:5,efectos:{lento:0,paralizado:0,confuso:0},escudo:false};
  const [cx,cy] = posAleatoria(26,muros,[jx,jy]);
  const mon = {x:cx,y:cy};
  const enes = [nuevoEnemigo(p,muros,[jx,jy]), nuevoEnemigo(p,muros,[jx,jy])];
  return {jug,mon,enes,muros,monMundo:0,balas:[],params:p,powerups:[]};
}

// ─────────────────────────────────────────────────────────────────
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawFondo(mundo, tick) {
  const fondos = ['#080812','#050519','#120519','#190a05','#051419','#0f0514'];
  ctx.fillStyle = fondos[Math.min(mundo-1,fondos.length-1)];
  ctx.fillRect(0,0,W,H);
  const rng = seededRng(mundo*31337);
  for(let i=0;i<50;i++) {
    const sx=Math.floor(rng()*(W)), sy=Math.floor(rng()*(H));
    const br = Math.max(0,Math.min(255,Math.round(80+60*Math.sin(tick/500+sx))));
    const hex = br.toString(16).padStart(2,'0');
    ctx.fillStyle = `#${hex}${hex}${hex}`;
    ctx.fillRect(sx,sy,1,1);
  }
}

function drawMuro(m, mundo) {
  const paletas = [
    ['#5a5a64','#373741'],['#3c506e','#233250'],['#643c64','#411d46'],
    ['#6e4b28','#4b3214'],['#285064','#143d4b']
  ];
  const [c,s] = paletas[Math.min(mundo-1,paletas.length-1)];
  ctx.fillStyle=c;
  roundRect(m.x,m.y,m.w,m.h,3); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(m.x,m.y+3); ctx.lineTo(m.x,m.y+m.h-3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(m.x+3,m.y); ctx.lineTo(m.x+m.w-3,m.y); ctx.stroke();
  ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(m.x+m.w,m.y+3); ctx.lineTo(m.x+m.w,m.y+m.h-3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(m.x+3,m.y+m.h); ctx.lineTo(m.x+m.w-3,m.y+m.h); ctx.stroke();
}

function drawMoneda(x, y, tick) {
  const cx=x+13, cy=y+13, r=12;
  const br = Math.max(0,Math.min(255,Math.round(180+75*Math.sin(tick/180))));
  ctx.beginPath(); ctx.arc(cx,cy,r+2,0,Math.PI*2);
  ctx.fillStyle='#785000'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle=`rgb(${br},${br},0)`; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,r-4,0,Math.PI*2);
  ctx.fillStyle='#fff0a0'; ctx.fill();
  ctx.fillStyle='#8c5a00'; ctx.font='bold 14px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('$',cx,cy);
  const ang=(tick/600)*Math.PI*2;
  for(let i=0;i<4;i++) {
    const a=ang+i*Math.PI/2;
    ctx.beginPath(); ctx.arc(cx+Math.cos(a)*(r+4),cy+Math.sin(a)*(r+4),2,0,Math.PI*2);
    ctx.fillStyle='#ffffc8'; ctx.fill();
  }
}

function drawBala(x,y,vx,vy) {
  const ang=Math.atan2(vy,vx);
  ctx.strokeStyle='#ff9632'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(x-Math.cos(ang)*8,y-Math.sin(ang)*8); ctx.lineTo(x,y); ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fillStyle='#ff5050'; ctx.fill();
  ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2); ctx.fillStyle='#fff064'; ctx.fill();
}

function drawRayo(x1,y1,x2,y2,tick) {
  const rng=seededRng(Math.floor(tick/80));
  const pts=[[x1,y1]];
  for(let i=1;i<6;i++) {
    const t=i/6;
    pts.push([x1+(x2-x1)*t+(rng()-0.5)*20, y1+(y2-y1)*t+(rng()-0.5)*20]);
  }
  pts.push([x2,y2]);
  ctx.strokeStyle='#64c8ff'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(x2,y2,5,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
}

function drawCorazon(cx,cy,r,color) {
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.arc(cx-r/2,cy-r/4,r/2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/2,cy-r/4,r/2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx-r,cy-r/4); ctx.lineTo(cx+r,cy-r/4); ctx.lineTo(cx,cy+r); ctx.closePath(); ctx.fill();
}

function drawPowerupEscudo(pu, tick) {
  const cx=pu.x+pu.r, cy=pu.y+pu.r, r=pu.r;
  const pulso=Math.abs(Math.round(6*Math.sin(tick/200)));
  // aura
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,r+pulso+12);
  grad.addColorStop(0,'rgba(80,200,255,0.3)'); grad.addColorStop(1,'rgba(80,200,255,0)');
  ctx.beginPath(); ctx.arc(cx,cy,r+pulso+12,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
  // nucleo
  ctx.beginPath(); ctx.arc(cx,cy,r+2,0,Math.PI*2); ctx.fillStyle='#1e50b4'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle='#50c8ff'; ctx.fill();
  // hex
  const angR=tick/600;
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<=6;i++) { const a=angR+i*Math.PI/3; i===0?ctx.moveTo(cx+Math.cos(a)*(r-4),cy+Math.sin(a)*(r-4)):ctx.lineTo(cx+Math.cos(a)*(r-4),cy+Math.sin(a)*(r-4)); }
  ctx.stroke();
  // text
  ctx.fillStyle='#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('+1',cx,cy);
}

function drawPerseguidor(x,y,tam,tick) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  const bob=Math.round(2*Math.sin(tick/200+x*0.05));
  // shadow
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,4,0,0,Math.PI*2); ctx.fillStyle='rgba(10,10,30,0.5)'; ctx.fill();
  // body
  ctx.beginPath(); ctx.arc(cx,cy+bob,r+2,0,Math.PI*2); ctx.fillStyle='#1e50b4'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy+bob,r,0,Math.PI*2); ctx.fillStyle='#328cff'; ctx.fill();
  // teeth
  const dw=Math.max(4,Math.floor(tam/6));
  const dy=cy+bob+r-3;
  ctx.fillStyle='#fff';
  for(let i=0;i<3;i++) {
    const bx=cx-dw*2+i*dw*2-dw/2;
    ctx.beginPath(); ctx.moveTo(bx,dy); ctx.lineTo(bx+dw,dy); ctx.lineTo(bx+dw/2,dy+dw); ctx.closePath(); ctx.fill();
  }
  // eyes
  const ox=Math.max(3,r/2), oy=Math.max(3,r/3);
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(cx-ox,cy+bob-oy,Math.max(3,r/3),0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+ox,cy+bob-oy,Math.max(3,r/3),0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(cx-ox,cy+bob-oy,Math.max(1,r/5),0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+ox,cy+bob-oy,Math.max(1,r/5),0,Math.PI*2); ctx.fill();
  // angry brows
  const ew=Math.max(4,r/2);
  ctx.strokeStyle='#dc3232'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx-ox-ew,cy+bob-oy-ew/2-2); ctx.lineTo(cx-ox+ew/2,cy+bob-oy-2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+ox-ew/2,cy+bob-oy-2); ctx.lineTo(cx+ox+ew,cy+bob-oy-ew/2-2); ctx.stroke();
}

function drawPistolero(x,y,tam,jx,jy,tick) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  const bob=Math.round(Math.sin(tick/300+y*0.05));
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,4,0,0,Math.PI*2); ctx.fillStyle='rgba(20,10,30,0.5)'; ctx.fill();
  roundRect(x-2,y-2+bob,tam+4,tam+4,5); ctx.fillStyle='#5a1e96'; ctx.fill();
  roundRect(x,y+bob,tam,tam,4); ctx.fillStyle='#9633e6'; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,y+bob); ctx.lineTo(cx,y+bob-r); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,y+bob-r,3,0,Math.PI*2); ctx.fillStyle='#ff5050'; ctx.fill();
  roundRect(cx-r/2,cy+bob-r/4,r,r/2,3); ctx.fillStyle='#00dcdc'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy+bob-r/8,Math.max(2,r/5),0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  const ang=Math.atan2(jy-cy,jx-cx);
  ctx.strokeStyle='#ff8c00'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(cx,cy+bob); ctx.lineTo(cx+Math.cos(ang)*(r+10),cy+Math.sin(ang)*(r+10)+bob); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx+Math.cos(ang)*(r+10),cy+Math.sin(ang)*(r+10)+bob,3,0,Math.PI*2); ctx.fillStyle='#ffc800'; ctx.fill();
}

function drawBomba(x,y,tam,tick,cargando,cargaPct) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  cargaPct=Math.max(0,Math.min(1,cargaPct||0));
  const extra=cargando?Math.round(4*cargaPct):0;
  let col;
  if(!cargando) col=`rgb(${Math.min(255,Math.round(220+35*cargaPct))},80,20)`;
  else col=`rgb(255,${Math.max(0,Math.round(80*(1-cargaPct)))},0)`;
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,4,0,0,Math.PI*2); ctx.fillStyle='rgba(30,15,5,0.5)'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,r+2+extra,0,Math.PI*2); ctx.fillStyle='#963200'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,r+extra,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
  // fuse
  const angM=tick/400;
  const mx1=cx+Math.cos(angM)*(r-2), my1=cy-r;
  const mx2=cx+Math.cos(angM)*r*1.3, my2=cy-r*1.4;
  ctx.strokeStyle='#b47800'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(mx1,my1); ctx.lineTo(mx2,my2); ctx.stroke();
  if(Math.floor(tick/100)%2===0) {
    ctx.beginPath(); ctx.arc(mx2,my2,4,0,Math.PI*2); ctx.fillStyle='#ffd700'; ctx.fill();
    ctx.beginPath(); ctx.arc(mx2,my2,2,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  }
  // face
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(cx-r/3,cy-r/4,Math.max(2,r/4),0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/3,cy-r/4,Math.max(2,r/4),0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(cx-r/3,cy-r/4,Math.max(1,r/6),0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/3,cy-r/4,Math.max(1,r/6),0,Math.PI*2); ctx.fill();
  // charge bar
  if(cargando && cargaPct>0) {
    const bw=tam+8;
    roundRect(cx-bw/2,cy+r+6,bw,6,3); ctx.fillStyle='rgba(60,20,0,0.8)'; ctx.fill();
    const fw=Math.max(1,Math.round(bw*cargaPct));
    roundRect(cx-bw/2,cy+r+6,fw,6,3); ctx.fillStyle='#ff8c00'; ctx.fill();
  }
}

function drawExplosion(cx,cy,radio,alphaPct) {
  if(radio<2) return;
  const rings=[[255,215,0,0.3],[255,140,0,0.6],[220,50,50,0.85],[255,255,255,1.0]];
  for(let i=0;i<rings.length;i++) {
    const [r,g,b,rm]=rings[i];
    const r2=Math.max(1,Math.round(radio*rm));
    const a=Math.max(0,alphaPct-(i*0.15));
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,r2);
    grd.addColorStop(0,`rgba(${r},${g},${b},${a})`);
    grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.beginPath(); ctx.arc(cx,cy,r2,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
  }
  const ri=Math.max(1,Math.round(radio*0.5)), ro=Math.max(2,Math.round(radio*1.1));
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=2;
  for(let i=0;i<8;i++) {
    const a2=i*Math.PI/4+(1-alphaPct)*2;
    ctx.beginPath(); ctx.moveTo(cx+Math.cos(a2)*ri,cy+Math.sin(a2)*ri); ctx.lineTo(cx+Math.cos(a2)*ro,cy+Math.sin(a2)*ro); ctx.stroke();
  }
}

function drawFantasma(x,y,tam,tick) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  const alpha=Math.max(0,Math.min(1,(130+60*Math.sin(tick/300))/255));
  const bob=Math.round(3*Math.sin(tick/250+x*0.04));
  ctx.save(); ctx.globalAlpha=alpha;
  // body
  ctx.fillStyle='#3cc850';
  ctx.beginPath();
  ctx.arc(cx,cy+bob,r,Math.PI,0);
  // wavy bottom
  ctx.lineTo(cx+r,cy+bob+r);
  const segs=5;
  for(let i=segs;i>=0;i--) {
    const bx=cx-r+i*(r*2/segs);
    const by=cy+bob+r+Math.round(4*Math.sin(tick/200+i*1.2));
    ctx.lineTo(bx,by);
  }
  ctx.closePath(); ctx.fill();
  // eyes
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(cx-r/3,cy+bob-r/4,Math.max(3,r/3),0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/3,cy+bob-r/4,Math.max(3,r/3),0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(cx-r/3,cy+bob-r/4,Math.max(1,r/5),0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/3,cy+bob-r/4,Math.max(1,r/5),0,Math.PI*2); ctx.fill();
  ctx.restore();
  // aura
  if(Math.floor(tick/150)%2===0) {
    ctx.strokeStyle='#145a28'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(cx,cy+bob,r+4,0,Math.PI*2); ctx.stroke();
  }
}

function drawEspejo(x,y,tam,tick) {
  const cx=x+tam/2, cy=y+tam/2, r=Math.max(10,tam/2);
  const angR=tick/800;
  // hex outline
  for(let i=0;i<6;i++) {
    const a1=angR+i*Math.PI/3, a2=angR+(i+1)*Math.PI/3;
    const br=Math.max(0,Math.min(255,Math.round(160+95*Math.sin(tick/200+i))));
    ctx.strokeStyle=`rgb(${br},${br},${br})`; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(cx+Math.cos(a1)*r,cy+Math.sin(a1)*r); ctx.lineTo(cx+Math.cos(a2)*r,cy+Math.sin(a2)*r); ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(cx,cy,Math.max(1,r-4),0,Math.PI*2); ctx.fillStyle='#c8c8d2'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,Math.max(1,r-8),0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  // sparkles
  for(let i=0;i<4;i++) {
    const a3=angR*2+i*Math.PI/2;
    ctx.strokeStyle='#ffc800'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx+Math.cos(a3)*Math.max(1,r-6),cy+Math.sin(a3)*Math.max(1,r-6)); ctx.lineTo(cx+Math.cos(a3)*2,cy+Math.sin(a3)*2); ctx.stroke();
  }
  // eye
  const ew=Math.max(2,r/3), eh=Math.max(2,r/5);
  ctx.beginPath(); ctx.ellipse(cx,cy,ew,eh,0,0,Math.PI*2); ctx.fillStyle='#1e50b4'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,Math.max(1,r/6),0,Math.PI*2); ctx.fillStyle='#000'; ctx.fill();
}

let starRngs = {};
function getStars(seed, n) {
  if(!starRngs[seed]) {
    const rng=seededRng(seed); starRngs[seed]=[];
    for(let i=0;i<n;i++) starRngs[seed].push([Math.floor(rng()*W),Math.floor(rng()*H)]);
  }
  return starRngs[seed];
}

function drawSniper(x,y,tam,tick,cargando,laser) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  // scope sight lines
  if(laser) {
    const pct=laser.pct;
    ctx.strokeStyle=`rgba(255,20,80,${0.3+pct*0.5})`; ctx.lineWidth=1+pct*2;
    ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(laser.x1,laser.y1); ctx.lineTo(laser.x2,laser.y2); ctx.stroke();
    ctx.setLineDash([]);
  }
  // shadow
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,4,0,0,Math.PI*2); ctx.fillStyle='rgba(30,5,10,0.5)'; ctx.fill();
  // body – sleek triangle shape
  ctx.fillStyle='#8b0000';
  ctx.beginPath(); ctx.moveTo(cx,cy-r-4); ctx.lineTo(cx+r+4,cy+r); ctx.lineTo(cx-r-4,cy+r); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#ff2050';
  ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r,cy+r-2); ctx.lineTo(cx-r,cy+r-2); ctx.closePath(); ctx.fill();
  // scope eye
  const scopeR=Math.max(3,r/3);
  ctx.beginPath(); ctx.arc(cx,cy,scopeR+2,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,scopeR,0,Math.PI*2); ctx.fillStyle='#ff2050'; ctx.fill();
  // crosshair
  ctx.strokeStyle='#fff'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx-scopeR,cy); ctx.lineTo(cx+scopeR,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-scopeR); ctx.lineTo(cx,cy+scopeR); ctx.stroke();
  // charge bar
  if(cargando>0.05) {
    const bw=tam+8;
    roundRect(cx-bw/2,cy+r+6,bw,5,3); ctx.fillStyle='rgba(30,5,10,0.8)'; ctx.fill();
    roundRect(cx-bw/2,cy+r+6,Math.max(1,bw*cargando),5,3); ctx.fillStyle='#ff2050'; ctx.fill();
  }
}

function drawDivisor(x,y,tam,tick) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  const bob=Math.round(2*Math.sin(tick/180+x*0.04));
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,4,0,0,Math.PI*2); ctx.fillStyle='rgba(0,20,30,0.4)'; ctx.fill();
  // two-lobe body
  ctx.fillStyle='#008ab4';
  ctx.beginPath(); ctx.arc(cx-r/3,cy+bob,r*0.7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/3,cy+bob,r*0.7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#00e0ff';
  ctx.beginPath(); ctx.arc(cx-r/3,cy+bob,r*0.55,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/3,cy+bob,r*0.55,0,Math.PI*2); ctx.fill();
  // dividing line hint
  ctx.strokeStyle='rgba(0,224,255,0.6)'; ctx.lineWidth=1; ctx.setLineDash([3,2]);
  ctx.beginPath(); ctx.moveTo(cx,cy+bob-r*0.5); ctx.lineTo(cx,cy+bob+r*0.5); ctx.stroke();
  ctx.setLineDash([]);
  // eyes
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(cx-r/3,cy+bob-r*0.3,Math.max(2,r/4),0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/3,cy+bob-r*0.3,Math.max(2,r/4),0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#003050';
  ctx.beginPath(); ctx.arc(cx-r/3,cy+bob-r*0.3,Math.max(1,r/6),0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/3,cy+bob-r*0.3,Math.max(1,r/6),0,Math.PI*2); ctx.fill();
}

function drawCurandero(x,y,tam,tick) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  const pulse=Math.abs(Math.round(3*Math.sin(tick/250)));
  // healing aura
  const auraGr=ctx.createRadialGradient(cx,cy,r,cx,cy,r+12+pulse);
  auraGr.addColorStop(0,'rgba(128,255,64,0.3)'); auraGr.addColorStop(1,'rgba(128,255,64,0)');
  ctx.beginPath(); ctx.arc(cx,cy,r+12+pulse,0,Math.PI*2); ctx.fillStyle=auraGr; ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,4,0,0,Math.PI*2); ctx.fillStyle='rgba(10,25,5,0.4)'; ctx.fill();
  // body – rounded cross shape
  ctx.fillStyle='#2a6010';
  roundRect(cx-r,cy-r,tam,tam,r/3); ctx.fill();
  ctx.fillStyle='#80ff40';
  roundRect(cx-r,cy-r,tam,tam,r/3); ctx.fill();
  // cross symbol
  const cr=Math.max(3,r/3);
  ctx.fillStyle='#fff';
  ctx.fillRect(cx-cr/2,cy-cr*1.5,cr,cr*3);
  ctx.fillRect(cx-cr*1.5,cy-cr/2,cr*3,cr);
  // eyes
  ctx.fillStyle='#1a3a0a';
  ctx.beginPath(); ctx.arc(cx-r/3,cy+r/3,Math.max(2,r/5),0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/3,cy+r/3,Math.max(2,r/5),0,Math.PI*2); ctx.fill();
  // floating + particles
  if(Math.floor(tick/300)%2===0) {
    ctx.fillStyle='rgba(128,255,64,0.8)'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
    ctx.fillText('+',cx+r+4,cy-r+Math.round(4*Math.sin(tick/400)));
  }
}

function drawIman(x,y,tam,tick,activo) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  if(activo) {
    // magnetic pull rings
    for(let ri=1;ri<=3;ri++) {
      const rr=r+ri*14+Math.round(4*Math.sin(tick/100+ri));
      const a=Math.max(0,(1-ri/4)*0.5);
      ctx.strokeStyle=`rgba(224,64,251,${a})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2); ctx.stroke();
    }
  }
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,4,0,0,Math.PI*2); ctx.fillStyle='rgba(20,5,25,0.4)'; ctx.fill();
  // U-magnet shape
  ctx.fillStyle='#7b0a9c';
  roundRect(x,y,tam,tam,r/2); ctx.fill();
  ctx.fillStyle='#e040fb';
  roundRect(x+2,y+2,tam-4,tam-4,r/2); ctx.fill();
  // poles N/S
  ctx.fillStyle='#ff4040'; ctx.font='bold '+Math.max(8,r/2)+'px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('N',cx-r/2,cy);
  ctx.fillStyle='#4040ff';
  ctx.fillText('S',cx+r/2,cy);
  // top U
  ctx.strokeStyle='#e040fb'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(cx,cy-r/2,r/3,Math.PI,0); ctx.stroke();
}

function drawTele(x,y,tam,tick) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  const ang=tick/500;
  // orbit rings
  for(let i=0;i<2;i++) {
    ctx.strokeStyle=`rgba(255,170,0,${0.4-i*0.15})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(cx,cy,r+6+i*6,0,Math.PI*2); ctx.stroke();
    // dot on ring
    const dotAng=ang*(i===0?1:-1);
    ctx.beginPath(); ctx.arc(cx+Math.cos(dotAng)*(r+6+i*6),cy+Math.sin(dotAng)*(r+6+i*6),3,0,Math.PI*2);
    ctx.fillStyle=i===0?'#ffaa00':'#fff740'; ctx.fill();
  }
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,4,0,0,Math.PI*2); ctx.fillStyle='rgba(25,15,0,0.4)'; ctx.fill();
  // body
  ctx.fillStyle='#8a5000';
  roundRect(x,y,tam,tam,r/2); ctx.fill();
  ctx.fillStyle='#ffaa00';
  roundRect(x+2,y+2,tam-4,tam-4,r/2); ctx.fill();
  // teleport icon: lightning bolt
  ctx.fillStyle='#fff'; ctx.font='bold '+Math.max(10,r)+'px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Z',cx,cy);
}

function drawEscudador(x,y,tam,tick,aliadoX,aliadoY) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  // bubble shield around protected ally
  if(aliadoX!=null) {
    const pulse=Math.abs(Math.sin(tick/200))*6;
    ctx.strokeStyle=`rgba(96,192,255,${0.4+0.3*Math.abs(Math.sin(tick/250))})`; ctx.lineWidth=2+pulse*0.3;
    ctx.beginPath(); ctx.arc(aliadoX,aliadoY,40+pulse,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(200,240,255,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(aliadoX,aliadoY,46+pulse,0,Math.PI*2); ctx.stroke();
  }
  // body — shield-shaped hexagon
  ctx.beginPath();
  for(let i=0;i<=6;i++) { const a=i*Math.PI/3-Math.PI/6; i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r); }
  ctx.fillStyle='#1e6080'; ctx.fill();
  ctx.fillStyle='#60c0ff';
  for(let i=0;i<=6;i++) { const a=i*Math.PI/3-Math.PI/6; i===0?ctx.moveTo(cx+Math.cos(a)*(r-3),cy+Math.sin(a)*(r-3)):ctx.lineTo(cx+Math.cos(a)*(r-3),cy+Math.sin(a)*(r-3)); }
  ctx.fill();
  // cross emblem
  ctx.fillStyle='#c8f0ff'; const cr2=Math.max(2,r/4);
  ctx.fillRect(cx-cr2/2,cy-cr2*1.5,cr2,cr2*3);
  ctx.fillRect(cx-cr2*1.5,cy-cr2/2,cr2*3,cr2);
}

function drawTorreta(x,y,tam,tick,ecx,ecy,jcx,jcy,timer,maxTimer) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  // base plate
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,5,0,0,Math.PI*2); ctx.fillStyle='rgba(80,60,20,0.5)'; ctx.fill();
  roundRect(x,y,tam,tam,3); ctx.fillStyle='#5a4010'; ctx.fill();
  roundRect(x+2,y+2,tam-4,tam-4,3); ctx.fillStyle='#c0a060'; ctx.fill();
  // bolts
  ctx.fillStyle='#604020';
  for(const [bx,by] of [[x+4,y+4],[x+tam-8,y+4],[x+4,y+tam-8],[x+tam-8,y+tam-8]]) {
    ctx.beginPath(); ctx.arc(bx,by,3,0,Math.PI*2); ctx.fill();
  }
  // rotating barrel aimed at player
  const bAng=Math.atan2(jcy-cy,jcx-cx);
  const chargeR=(maxTimer-timer)/maxTimer;
  ctx.strokeStyle=chargeR>0.6?`rgba(255,${Math.round(255*(1-chargeR))},0,0.9)`:'#a08040'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(bAng)*(r+14),cy+Math.sin(bAng)*(r+14)); ctx.stroke();
  ctx.strokeStyle='#c0a060'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(bAng)*(r+10),cy+Math.sin(bAng)*(r+10)); ctx.stroke();
  // charge ring
  if(chargeR>0.3) {
    ctx.strokeStyle=`rgba(255,200,0,${chargeR})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,r+2,0,Math.PI*2*chargeR); ctx.stroke();
  }
}

function drawBerserker(x,y,tam,tick,enojo) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  const pulse=enojo*4;
  // rage aura
  if(enojo>0.2) {
    const gr=ctx.createRadialGradient(cx,cy,r,cx,cy,r+8+pulse*3);
    gr.addColorStop(0,`rgba(255,50,0,${enojo*0.5})`); gr.addColorStop(1,'rgba(255,0,0,0)');
    ctx.beginPath(); ctx.arc(cx,cy,r+8+pulse*3,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
  }
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,5,0,0,Math.PI*2); ctx.fillStyle='rgba(30,0,0,0.5)'; ctx.fill();
  // body gets bigger and redder with enojo
  const col=`rgb(${Math.round(160+95*enojo)},${Math.round(30*(1-enojo))},0)`;
  roundRect(x-pulse,y-pulse,tam+pulse*2,tam+pulse*2,6);
  ctx.fillStyle='#600000'; ctx.fill();
  roundRect(x-pulse+2,y-pulse+2,tam+pulse*2-4,tam+pulse*2-4,5);
  ctx.fillStyle=col; ctx.fill();
  // veins when enraged
  if(enojo>0.5) {
    ctx.strokeStyle=`rgba(255,0,0,${enojo-0.5})`; ctx.lineWidth=1.5;
    for(let i=0;i<3;i++) {
      const vAng=tick/300+i*2.1;
      ctx.beginPath(); ctx.moveTo(cx+Math.cos(vAng)*r*0.3,cy+Math.sin(vAng)*r*0.3);
      ctx.lineTo(cx+Math.cos(vAng)*r*0.8,cy+Math.sin(vAng)*r*0.8); ctx.stroke();
    }
  }
  // face
  const eyeR=Math.max(3,r/3);
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(cx-r/3,cy-r/4,eyeR,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/3,cy-r/4,eyeR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=enojo>0.5?'#ff0000':'#500000';
  ctx.beginPath(); ctx.arc(cx-r/3,cy-r/4,eyeR/2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/3,cy-r/4,eyeR/2,0,Math.PI*2); ctx.fill();
}

function drawVampiro(x,y,tam,tick,robando) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  if(robando) {
    // drain beam visual
    ctx.strokeStyle=`rgba(180,0,40,${0.4+0.4*Math.sin(tick/80)})`; ctx.lineWidth=3;
    ctx.setLineDash([6,4]);
    // beam drawn in main loop via caller
    ctx.setLineDash([]);
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,r+10);
    gr.addColorStop(0,'rgba(180,0,40,0.4)'); gr.addColorStop(1,'rgba(120,0,20,0)');
    ctx.beginPath(); ctx.arc(cx,cy,r+10,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
  }
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,5,0,0,Math.PI*2); ctx.fillStyle='rgba(20,0,5,0.5)'; ctx.fill();
  // cape body
  ctx.beginPath();
  ctx.moveTo(cx-r,cy-r);
  ctx.lineTo(cx+r,cy-r);
  ctx.lineTo(cx+r*1.3,cy+r);
  ctx.lineTo(cx,cy+r*0.6);
  ctx.lineTo(cx-r*1.3,cy+r);
  ctx.closePath();
  ctx.fillStyle='#2a0010'; ctx.fill();
  // face
  roundRect(x+r*0.1,y,tam*0.8,tam*0.7,r/3); ctx.fillStyle='#800020'; ctx.fill();
  // eyes
  ctx.fillStyle='#ff0040';
  ctx.beginPath(); ctx.ellipse(cx-r/3,cy-r/4,r/4,r/5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+r/3,cy-r/4,r/4,r/5,0,0,Math.PI*2); ctx.fill();
  // fangs
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.moveTo(cx-r*0.2,cy+r*0.1); ctx.lineTo(cx-r*0.1,cy+r*0.1); ctx.lineTo(cx-r*0.15,cy+r*0.3); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+r*0.1,cy+r*0.1); ctx.lineTo(cx+r*0.2,cy+r*0.1); ctx.lineTo(cx+r*0.15,cy+r*0.3); ctx.closePath(); ctx.fill();
}

function drawNinja(x,y,tam,tick,invisible) {
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  const alpha=invisible?Math.max(0.08,0.3*Math.abs(Math.sin(tick/60))):1;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath(); ctx.ellipse(cx,cy+r-2,r,5,0,0,Math.PI*2); ctx.fillStyle='rgba(10,10,20,0.5)'; ctx.fill();
  // dark body
  roundRect(x,y,tam,tam,r/3); ctx.fillStyle='#1a1a2e'; ctx.fill();
  roundRect(x+2,y+2,tam-4,tam-4,r/3); ctx.fillStyle='#404060'; ctx.fill();
  // mask slit
  ctx.fillStyle='#ff4000';
  ctx.fillRect(x+4,cy-3,tam-8,6);
  // eyes glow through mask
  ctx.fillStyle='#ff8000';
  ctx.beginPath(); ctx.arc(cx-r/4,cy,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r/4,cy,3,0,Math.PI*2); ctx.fill();
  // shuriken spinning at side when dashing
  if(invisible) {
    const sAng=tick/80;
    for(let pi=0;pi<4;pi++) {
      const pa=sAng+pi*Math.PI/2;
      ctx.strokeStyle='#c0c0c0'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(cx+Math.cos(pa)*(r+12),cy+Math.sin(pa)*(r+12));
      ctx.lineTo(cx+Math.cos(pa+Math.PI)*(r+12),cy+Math.sin(pa+Math.PI)*(r+12)); ctx.stroke();
    }
  }
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────
// DRAW SHOP
// ─────────────────────────────────────────────────────────────────
function drawShop(sel, scroll, tick) {
  ctx.fillStyle='#060612'; ctx.fillRect(0,0,W,H);
  const stars=getStars(777,60);
  for(const [sx,sy] of stars) {
    const br=Math.max(0,Math.min(255,Math.round(50+50*Math.sin(tick/600+sx*0.01))));
    ctx.fillStyle=`rgb(${br},${Math.round(br*0.8)},0)`; ctx.fillRect(sx,sy,1,1);
  }
  // title
  ctx.fillStyle='#ffd700'; ctx.font='bold 36px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=15;
  ctx.fillText('TIENDA  /  SHOP',W/2,18);
  ctx.shadowBlur=0;
  // wallet
  ctx.fillStyle='#ffc800'; ctx.font='bold 20px monospace';
  ctx.fillText(`💰 ${monedasAcumuladas} ${T('monedas_hud')}`,W/2,62);
  ctx.fillStyle='rgba(255,200,0,0.2)'; ctx.strokeStyle='rgba(255,200,0,0.4)'; ctx.lineWidth=1;
  roundRect(W/2-140,58,280,26,6); ctx.fill(); ctx.stroke();

  // items grid — 2 columns
  const COLS=2, itemW=560, itemH=72, gap=10;
  const gridX=W/2-itemW-gap/2, gridY=100;
  const VISIBLE_ROWS=5;

  for(let vi=0;vi<VISIBLE_ROWS*COLS;vi++) {
    const idx=scroll*COLS+vi;
    if(idx>=TIENDA_ITEMS.length) break;
    const item=TIENDA_ITEMS[idx];
    const col=vi%COLS, row=Math.floor(vi/COLS);
    const ix=gridX+(col*(itemW+gap)), iy=gridY+row*(itemH+gap);
    const sel2=(idx===sel);
    const maxed=itemMaxed(item);
    const canBuy=!maxed&&monedasAcumuladas>=item.costo;
    const bought=getComprado(item.id)>0;

    // shadow
    ctx.fillStyle='rgba(5,5,20,0.6)'; roundRect(ix+3,iy+3,itemW,itemH,10); ctx.fill();
    // bg
    let bgCol;
    if(maxed) bgCol='rgba(30,30,10,0.9)';
    else if(sel2) bgCol='rgba(80,60,10,0.95)';
    else bgCol='rgba(20,20,40,0.9)';
    ctx.fillStyle=bgCol; roundRect(ix,iy,itemW,itemH,10); ctx.fill();
    // border
    let borderCol;
    if(maxed) borderCol='rgba(100,80,0,0.5)';
    else if(sel2) borderCol='#ffd700';
    else if(canBuy) borderCol='rgba(180,140,0,0.6)';
    else borderCol='rgba(60,60,80,0.5)';
    ctx.strokeStyle=borderCol; ctx.lineWidth=sel2?2:1;
    roundRect(ix,iy,itemW,itemH,10); ctx.stroke();

    // icon
    ctx.font='28px serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(item.icono,ix+14,iy+itemH/2);

    // name
    ctx.font=`bold 15px monospace`; ctx.fillStyle=maxed?'#888':sel2?'#ffd700':'#ddd';
    ctx.textAlign='left'; ctx.fillText(itemDesc(item),ix+52,iy+20);
    // count bought
    if(bought) {
      ctx.fillStyle='rgba(128,255,64,0.8)'; ctx.font='11px monospace';
      ctx.fillText(`✓ x${getComprado(item.id)}`,ix+52,iy+40);
    }
    // cost
    const costCol=maxed?'#555':(canBuy?'#ffc800':'#a04000');
    ctx.fillStyle=costCol; ctx.font='bold 14px monospace'; ctx.textAlign='right';
    ctx.fillText(maxed?'MAXED':`💰 ${item.costo}`,ix+itemW-10,iy+itemH/2);

    // sel arrow
    if(sel2 && !maxed) {
      ctx.fillStyle='#ffd700'; ctx.textAlign='left';
      ctx.font='12px monospace'; ctx.fillText('▶ ENTER',ix+4,iy+itemH-10);
    }
  }

  // scroll arrows
  const totalRows=Math.ceil(TIENDA_ITEMS.length/COLS);
  ctx.fillStyle='rgba(255,200,0,0.7)';
  if(scroll>0) { ctx.beginPath(); ctx.moveTo(W/2,gridY-16); ctx.lineTo(W/2-10,gridY-6); ctx.lineTo(W/2+10,gridY-6); ctx.closePath(); ctx.fill(); }
  if(scroll+VISIBLE_ROWS<totalRows) { const by=gridY+VISIBLE_ROWS*(itemH+gap)+4; ctx.beginPath(); ctx.moveTo(W/2,by+14); ctx.lineTo(W/2-10,by+4); ctx.lineTo(W/2+10,by+4); ctx.closePath(); ctx.fill(); }

  // Reset Profile button
  const rTxt='RESET PROFILE (mantener R 5s)';
  ctx.font='12px monospace'; ctx.fillStyle='rgba(180,60,60,0.8)'; ctx.textAlign='center';
  ctx.fillText(rTxt,W/2,H-38);

  // instructions
  ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillStyle='rgba(160,140,60,0.8)'; ctx.font='13px monospace';
  ctx.fillText('WASD / flechas para navegar  |  ENTER para comprar  |  ESC para volver',W/2,H-16);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function applyPurchase(item) {
  if(itemMaxed(item)||monedasAcumuladas<item.costo) return false;
  monedasAcumuladas-=item.costo; saveCoins(monedasAcumuladas);
  comprados[item.id]=(comprados[item.id]||0)+1; saveShop();
  if(item.id==='vida')    { vidas=Math.min(vidas+1,9); }
  else if(item.id==='escudo')  { estado.jug.escudo=true; }
  else if(item.id==='veloc')   { estado.jug.velBase=Math.min(estado.jug.velBase+1,9); }
  else if(item.id==='x2coins') { x2CoinsActivo=true; }
  else if(item.id==='slowmo')  { slowmoActivo=5000; }
  else if(item.id==='imune')   { imuneActivo=10000; }
  else if(item.id==='magnet')  { magnetActivo=15000; }
  else if(item.id==='revive')  { reviveActivo=true; }
  else if(item.id==='supvel')  { supvelActivo=8000; estado.jug.velBase=Math.min(estado.jug.velBase+4,14); }
  else if(item.id.startsWith('skin_')) {
    skinActual=item.id.replace('skin_',''); saveShop();
    spawnFX={x:estado.jug.x+estado.jug.tam/2, y:estado.jug.y+estado.jug.tam/2, timer:800, skin:skinActual};
  }
  return true;
}

function getSkinColors() {
  switch(skinActual) {
    case 'fire':   return ['#ff6000','#aa2000'];
    case 'ice':    return ['#80e8ff','#0080b0'];
    case 'dark':   return ['#8020cc','#1a003a'];
    case 'neon':   return ['#00ff88','#007040'];
    case 'ghost':  return ['rgba(180,200,255,0.7)','rgba(100,120,200,0.5)'];
    case 'c':      return ['#ffd700','#a07000'];
    case 'plasma': return ['#ff40ff','#800080'];
    case 'void':   return ['#080808','#000000'];
    default:       return ['#dc3232','#8c1414'];
  }
}

function drawSkinEffect(skin, x, y, tam, cx, cy, r, tick) {
  if(skin==='fire') {
    for(let i=0;i<6;i++) {
      const phase=tick/120+i*1.05;
      const px=cx+(Math.sin(phase*1.3+i)*r*0.5);
      const py=y-4+Math.sin(phase)*6;
      const pr=Math.max(1,3+Math.sin(phase*0.7)*2);
      const heat=Math.round(200+55*Math.sin(phase));
      ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,${heat},0,0.7)`; ctx.fill();
    }
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,r+10);
    gr.addColorStop(0,'rgba(255,100,0,0.3)'); gr.addColorStop(1,'rgba(255,0,0,0)');
    ctx.beginPath(); ctx.arc(cx,cy,r+10,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
  }
  else if(skin==='ice') {
    for(let i=0;i<5;i++) {
      const a=tick/700+i*(Math.PI*2/5);
      const sx2=cx+Math.cos(a)*(r+7), sy2=cy+Math.sin(a)*(r+7);
      ctx.save(); ctx.translate(sx2,sy2); ctx.rotate(a+tick/300);
      ctx.strokeStyle='rgba(180,240,255,0.8)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(-4,0); ctx.lineTo(4,0);
      ctx.moveTo(0,-4); ctx.lineTo(0,4);
      ctx.moveTo(-3,-3); ctx.lineTo(3,3);
      ctx.moveTo(3,-3); ctx.lineTo(-3,3);
      ctx.stroke(); ctx.restore();
    }
    const gr=ctx.createRadialGradient(cx,cy,r-2,cx,cy,r+12);
    gr.addColorStop(0,'rgba(150,230,255,0.2)'); gr.addColorStop(1,'rgba(0,180,255,0)');
    ctx.beginPath(); ctx.arc(cx,cy,r+12,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
  }
  else if(skin==='dark') {
    for(let i=0;i<4;i++) {
      const a=-(tick/400)+i*(Math.PI/2);
      const orb=r+5+Math.sin(tick/300+i)*3;
      ctx.beginPath(); ctx.arc(cx+Math.cos(a)*orb,cy+Math.sin(a)*orb,4,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,80,255,${0.5+0.3*Math.sin(tick/200+i)})`; ctx.fill();
    }
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,r+14);
    gr.addColorStop(0,'rgba(80,0,160,0.4)'); gr.addColorStop(1,'rgba(30,0,80,0)');
    ctx.beginPath(); ctx.arc(cx,cy,r+14,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
  }
  else if(skin==='neon') {
    const pulse=Math.abs(Math.sin(tick/180));
    ctx.strokeStyle=`rgba(0,255,136,${0.3+pulse*0.5})`; ctx.lineWidth=2+pulse*3;
    ctx.beginPath(); ctx.arc(cx,cy,r+4+pulse*4,0,Math.PI*2); ctx.stroke();
    ctx.lineWidth=1;
    for(let i=0;i<3;i++) {
      const a=tick/200+i*(Math.PI*2/3);
      ctx.strokeStyle='rgba(0,255,136,0.6)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a)*(r+2),cy+Math.sin(a)*(r+2));
      ctx.lineTo(cx+Math.cos(a+0.3)*(r+10),cy+Math.sin(a+0.3)*(r+10));
      ctx.stroke();
    }
  }
  else if(skin==='ghost') {
    for(let i=0;i<3;i++) {
      ctx.beginPath(); ctx.arc(cx,cy+i*8,r-i*3,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,210,255,${0.15-i*0.04})`; ctx.fill();
    }
  }
  else if(skin==='c') {
    for(let i=0;i<5;i++) {
      const phase=tick/300+i*1.26;
      const sp=r+3+Math.sin(phase)*4;
      ctx.beginPath(); ctx.arc(cx+Math.cos(phase)*sp,cy+Math.sin(phase)*sp,2,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,230,80,${0.5+0.5*Math.sin(phase*2)})`; ctx.fill();
    }
  }
  else if(skin==='plasma') {
    // shifting wave rings
    for(let ri=0;ri<3;ri++) {
      const wAng=tick/400+ri*Math.PI*2/3;
      const wr=r+6+ri*5+Math.sin(tick/200+ri)*3;
      ctx.strokeStyle=`rgba(255,${Math.round(64+80*Math.sin(tick/300+ri))},255,${0.4-ri*0.1})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cx,cy,wr,0,Math.PI*2); ctx.stroke();
    }
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,r+16);
    gr.addColorStop(0,'rgba(255,64,255,0.3)'); gr.addColorStop(1,'rgba(128,0,255,0)');
    ctx.beginPath(); ctx.arc(cx,cy,r+16,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
  }
  else if(skin==='void') {
    // dark singularity — pulls starfield inward
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,r+20);
    gr.addColorStop(0,'rgba(0,0,0,0.9)'); gr.addColorStop(0.5,'rgba(40,0,80,0.6)'); gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(cx,cy,r+20,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
    // event horizon sparks
    for(let i=0;i<6;i++) {
      const a=tick/500+i*Math.PI/3;
      const sr=r+2+Math.sin(tick/150+i)*4;
      ctx.beginPath(); ctx.arc(cx+Math.cos(a)*sr,cy+Math.sin(a)*sr,2,0,Math.PI*2);
      ctx.fillStyle=`rgba(160,80,255,${0.4+0.4*Math.sin(tick/200+i)})`; ctx.fill();
    }
  }
}

function drawJugador(jug, tick) {
  const {x,y,tam,efectos,escudo} = jug;
  const cx=x+tam/2, cy=y+tam/2, r=tam/2;
  const lento=efectos.lento>0, paralizado=efectos.paralizado>0, confuso=efectos.confuso>0;
  const affected=paralizado||lento||confuso;
  let colC, colB;
  if(paralizado)   { colC='#6464c8'; colB='#323296'; }
  else if(lento)   { colC='#00dcdc'; colB='#00a0a0'; }
  else if(confuso) { colC='#ff64b4'; colB='#b42878'; }
  else             { [colC,colB]=getSkinColors(); }

  // skin ambient effect (behind body)
  if(!affected) drawSkinEffect(skinActual,x,y,tam,cx,cy,r,tick);

  // shield aura
  if(escudo) {
    const pulse=Math.abs(Math.round(8*Math.sin(tick/150)));
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,r+pulse+8);
    gr.addColorStop(0,'rgba(80,200,255,0.4)'); gr.addColorStop(1,'rgba(80,200,255,0)');
    ctx.beginPath(); ctx.arc(cx,cy,r+pulse+8,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
    ctx.strokeStyle='#50c8ff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,r+pulse+6,0,Math.PI*2); ctx.stroke();
  }

  // shadow
  ctx.beginPath(); ctx.ellipse(cx,cy+r-3,r,5,0,0,Math.PI*2); ctx.fillStyle='rgba(15,15,15,0.5)'; ctx.fill();

  if(skinActual==='ghost' && !affected) ctx.globalAlpha=0.65;

  // border
  roundRect(x-2,y-2,tam+4,tam+4,8); ctx.fillStyle=colB; ctx.fill();

  // body fill — skin-specific
  if(!affected && skinActual==='fire') {
    const gr2=ctx.createLinearGradient(x,y+tam,x,y);
    gr2.addColorStop(0,'#ff2000'); gr2.addColorStop(0.5,'#ff6000'); gr2.addColorStop(1,'#ffcc00');
    roundRect(x,y,tam,tam,6); ctx.fillStyle=gr2; ctx.fill();
  } else if(!affected && skinActual==='ice') {
    const gr2=ctx.createLinearGradient(x,y,x+tam,y+tam);
    gr2.addColorStop(0,'#e8faff'); gr2.addColorStop(0.5,'#80e8ff'); gr2.addColorStop(1,'#0080c8');
    roundRect(x,y,tam,tam,6); ctx.fillStyle=gr2; ctx.fill();
  } else if(!affected && skinActual==='dark') {
    const gr2=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    gr2.addColorStop(0,'#8020cc'); gr2.addColorStop(1,'#1a003a');
    roundRect(x,y,tam,tam,6); ctx.fillStyle=gr2; ctx.fill();
  } else if(!affected && skinActual==='neon') {
    roundRect(x,y,tam,tam,6); ctx.fillStyle='#00cc66'; ctx.fill();
    ctx.fillStyle='rgba(0,255,136,0.35)';
    for(let li=0;li<tam;li+=5) ctx.fillRect(x,y+li,tam,2);
  } else if(!affected && skinActual==='c') {
    const gr2=ctx.createLinearGradient(x,y,x+tam,y+tam);
    gr2.addColorStop(0,'#fffbe0'); gr2.addColorStop(0.4,'#ffd700'); gr2.addColorStop(0.7,'#b8860b'); gr2.addColorStop(1,'#ffd700');
    roundRect(x,y,tam,tam,6); ctx.fillStyle=gr2; ctx.fill();
  } else if(!affected && skinActual==='plasma') {
    const gr2=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    gr2.addColorStop(0,'#ff80ff'); gr2.addColorStop(0.5,'#cc00cc'); gr2.addColorStop(1,'#400060');
    roundRect(x,y,tam,tam,6); ctx.fillStyle=gr2; ctx.fill();
    // animated wave overlay
    ctx.fillStyle=`rgba(255,200,255,${0.15+0.1*Math.sin(tick/100)})`;
    roundRect(x,y,tam,tam/2,6); ctx.fill();
  } else if(!affected && skinActual==='void') {
    roundRect(x,y,tam,tam,6); ctx.fillStyle='#050508'; ctx.fill();
    // gravitational lensing ring
    ctx.strokeStyle=`rgba(120,40,200,${0.5+0.3*Math.sin(tick/200)})`; ctx.lineWidth=2;
    roundRect(x+3,y+3,tam-6,tam-6,5); ctx.stroke();
  } else {
    roundRect(x,y,tam,tam,6); ctx.fillStyle=colC; ctx.fill();
  }

  ctx.globalAlpha=1;

  if(affected && Math.floor(tick/200)%2===0) {
    roundRect(x,y,tam,tam,6); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  }

  // eyes — skin-specific colour
  const ox=tam/5, oy=tam/4;
  let eyeW='#fff', eyeP='#000';
  if(!affected) {
    if(skinActual==='dark')   { eyeW='#cc88ff'; eyeP='#ff00ff'; }
    if(skinActual==='fire')   { eyeW='#ffe080'; eyeP='#ff4000'; }
    if(skinActual==='neon')   { eyeW='#ccffee'; eyeP='#00ff88'; }
    if(skinActual==='ghost')  { eyeW='rgba(220,230,255,0.9)'; eyeP='rgba(80,100,200,0.8)'; }
    if(skinActual==='ice')    { eyeW='#e8faff'; eyeP='#0040a0'; }
    if(skinActual==='c')      { eyeW='#fffbe0'; eyeP='#704000'; }
    if(skinActual==='plasma') { eyeW='#ffccff'; eyeP='#cc00cc'; }
    if(skinActual==='void')   { eyeW='rgba(160,80,255,0.9)'; eyeP='#000'; }
  }
  ctx.fillStyle=eyeW;
  ctx.beginPath(); ctx.arc(x+ox,y+oy,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+tam-ox,y+oy,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=eyeP;
  ctx.beginPath(); ctx.arc(x+ox,y+oy,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+tam-ox,y+oy,2,0,Math.PI*2); ctx.fill();

  // mouth
  const bx2=x+tam/2, bby=y+tam*0.65, bw=tam/3;
  ctx.strokeStyle= (!affected && skinActual==='dark') ? '#cc88ff' : '#fff';
  ctx.lineWidth=2;
  if(paralizado) {
    ctx.beginPath(); ctx.moveTo(bx2-bw,bby); ctx.lineTo(bx2+bw,bby); ctx.stroke();
  } else if(lento||confuso) {
    ctx.beginPath(); ctx.arc(bx2,bby+2,bw,Math.PI,0,true); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(bx2,bby-4,bw,0,Math.PI); ctx.stroke();
  }

  if(confuso) {
    ctx.fillStyle='#fff'; ctx.font='bold 14px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('?',cx,y-12);
  }
}

function drawNombreScreen(tick) {
  ctx.fillStyle='#060610'; ctx.fillRect(0,0,W,H);
  const stars=getStars(55,60);
  for(const [sx,sy] of stars) {
    const br=Math.max(0,Math.min(255,Math.round(50+50*Math.sin(tick/600+sx*0.01))));
    ctx.fillStyle=`rgb(${br},${br},${br})`; ctx.fillRect(sx,sy,1,1);
  }
  // Title
  ctx.fillStyle='#ffd700'; ctx.font='bold 52px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=20;
  ctx.fillText('ATRAPA LA MONEDA', W/2, 80);
  ctx.shadowBlur=0;

  ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='22px monospace';
  ctx.fillText('Ingresa tu nombre para jugar', W/2, 170);

  // Input box
  const bw=420, bh=58, bx=W/2-bw/2, by=230;
  roundRect(bx,by,bw,bh,10); ctx.fillStyle='rgba(20,20,40,0.95)'; ctx.fill();
  const pct=Math.abs(Math.sin(tick/400));
  ctx.strokeStyle=`rgba(255,215,0,${0.5+pct*0.5})`; ctx.lineWidth=2;
  roundRect(bx,by,bw,bh,10); ctx.stroke();

  // typed name + cursor
  const cursor = nombreCursor ? '|' : ' ';
  ctx.fillStyle='#fff'; ctx.font='bold 28px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText((nombreInput||'') + cursor, W/2, by+bh/2);

  ctx.fillStyle='rgba(180,180,180,0.7)'; ctx.font='15px monospace';
  ctx.fillText('Escribe tu nombre y presiona ENTER', W/2, by+bh+24);
  ctx.fillStyle='rgba(120,120,150,0.6)'; ctx.font='13px monospace';
  ctx.fillText('(Maximo 20 caracteres, letras y numeros)', W/2, by+bh+46);

  // Show leaderboard preview
  if(leaderboard.length>0) {
    ctx.fillStyle='rgba(255,215,0,0.7)'; ctx.font='bold 16px monospace';
    ctx.fillText('TOP 5 GLOBAL', W/2, by+bh+90);
    for(let i=0;i<Math.min(5,leaderboard.length);i++) {
      const {nombre,puntos}=leaderboard[i];
      const medal=['🥇','🥈','🥉','4.','5.'][i];
      ctx.fillStyle=i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'rgba(200,200,200,0.7)';
      ctx.font=`${i<3?'bold ':''  }14px monospace`;
      ctx.fillText(`${medal} ${nombre}  ${puntos}`, W/2, by+bh+112+i*22);
    }
  }
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawLeaderboard(tick) {
  ctx.fillStyle='#060610'; ctx.fillRect(0,0,W,H);
  const stars=getStars(88,50);
  for(const [sx,sy] of stars) {
    const br=Math.max(0,Math.min(255,Math.round(50+40*Math.sin(tick/700+sx*0.01))));
    ctx.fillStyle=`rgb(${br},${br},0)`; ctx.fillRect(sx,sy,1,1);
  }
  // Title
  ctx.fillStyle='#ffd700'; ctx.font='bold 34px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=12;
  ctx.fillText('RANKING GLOBAL', W/2, 18);
  ctx.shadowBlur=0;

  // Connection status
  ctx.font='12px monospace'; ctx.fillStyle=supaStatus.startsWith('✅')?'#40ff80':'#ff8040';
  ctx.fillText(supaStatus, W/2, 58);

  // Mundo filter tabs
  const tabs = [
    {label:'TODOS',   val:null},
    {label:'FACIL',   val:'facil'},
    {label:'NORMAL',  val:'normal'},
    {label:'DIFICIL', val:'dificil'},
  ];
  const tabY=76, tabH=24;
  let tabX=W/2-200;
  ctx.font='13px monospace'; ctx.textAlign='left'; ctx.textBaseline='top';
  for(const tab of tabs) {
    const tw=ctx.measureText(tab.label).width+18;
    const sel=leaderboardDif===tab.val;
    const tabCol=tab.val==='facil'?'#3cc850':tab.val==='normal'?'#ffd700':tab.val==='dificil'?'#ff3030':'#c8c8c8';
    ctx.fillStyle=sel?tabCol:'rgba(40,40,60,0.9)';
    roundRect(tabX,tabY,tw,tabH,5); ctx.fill();
    ctx.strokeStyle=sel?tabCol:'rgba(100,100,130,0.5)'; ctx.lineWidth=sel?2:1;
    roundRect(tabX,tabY,tw,tabH,5); ctx.stroke();
    ctx.fillStyle=sel?'#000':'rgba(180,180,200,0.8)';
    ctx.fillText(tab.label,tabX+9,tabY+5);
    tabX+=tw+8;
  }

  // Leaderboard rows
  const listY=108;
  if(leaderboard.length===0) {
    ctx.fillStyle='rgba(180,180,180,0.6)'; ctx.font='18px monospace'; ctx.textAlign='center';
    ctx.fillText('Sin datos aun — juega y pierde para aparecer!', W/2, listY+40);
  } else {
    const medals=['🥇','🥈','🥉'];
    ctx.textAlign='left';
    for(let i=0;i<leaderboard.length;i++) {
      const {nombre,puntos,dificultad:rowDif}=leaderboard[i];
      const y=listY+i*46;
      const isMe=(nombre===nombreJugador);
      if(isMe) {
        ctx.fillStyle='rgba(255,215,0,0.1)';
        roundRect(W/2-340,y-2,680,40,6); ctx.fill();
      }
      // rank
      ctx.fillStyle=i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'rgba(200,200,200,0.7)';
      ctx.font=`bold ${i<3?20:16}px monospace`; ctx.textAlign='left';
      ctx.fillText(i<3?medals[i]:`${i+1}.`, W/2-330, y+18);
      // name
      ctx.fillStyle=isMe?'#ffd700':'#fff';
      ctx.font=`${isMe?'bold ':'' }16px monospace`;
      ctx.fillText(nombre, W/2-280, y+18);
      // dificultad badge
      if(rowDif) {
        const dBadgeCol=rowDif==='facil'?'#1a4a20':rowDif==='normal'?'#4a3a00':'#4a0808';
        const dTextCol=rowDif==='facil'?'#3cc850':rowDif==='normal'?'#ffd700':'#ff5050';
        const badgeTxt=rowDif.toUpperCase();
        ctx.fillStyle=dBadgeCol;
        roundRect(W/2+80,y+2,72,24,4); ctx.fill();
        ctx.fillStyle=dTextCol; ctx.font='bold 11px monospace'; ctx.textAlign='center';
        ctx.fillText(badgeTxt, W/2+116, y+14);
      }
      // score
      ctx.textAlign='right'; ctx.fillStyle=isMe?'#ffd700':'rgba(220,220,220,0.9)';
      ctx.font='bold 18px monospace';
      ctx.fillText(puntos.toLocaleString(), W/2+320, y+18);
      // divider
      ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(W/2-320,y+42); ctx.lineTo(W/2+320,y+42); ctx.stroke();
    }
  }

  // Instructions
  ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillStyle='rgba(120,120,150,0.8)'; ctx.font='13px monospace';
  ctx.fillText('ESC = volver  |  R = recargar  |  clic en tab para filtrar por mundo', W/2, H-14);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawMenu(opcion, tick, hs) {
  ctx.fillStyle='#080814'; ctx.fillRect(0,0,W,H);
  const stars=getStars(42,80);
  for(const [sx,sy] of stars) {
    const br=Math.max(0,Math.min(255,Math.round(60+80*Math.sin(tick/600+sx*0.01))));
    ctx.fillStyle=`rgb(${br},${br},${br})`; ctx.fillRect(sx,sy,1,1);
  }
  // title
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=20;
  ctx.fillStyle='rgba(80,60,0,0.8)'; ctx.font='bold 64px monospace';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(T('titulo'),W/2+3,83);
  ctx.fillStyle='#ffd700'; ctx.fillText(T('titulo'),W/2,80);
  ctx.shadowBlur=0;
  // subtitle
  const subR=Math.max(0,Math.min(255,Math.round(180+60*Math.sin(tick/400))));
  ctx.fillStyle=`rgb(${subR},180,255)`; ctx.font='bold 28px monospace';
  ctx.fillText(T('sel_dif'),W/2,162);
  // high score
  ctx.fillStyle='#ffc800'; ctx.font='16px monospace';
  ctx.fillText(`${T('high_score')}: ${hs}`,W/2,196);
  // options
  const opts=[
    ['#3cc850',T('facil'),T('desc_facil')],
    ['#ffd700',T('normal'),T('desc_normal')],
    ['#dc3232',T('dificil'),T('desc_dificil')]
  ];
  for(let i=0;i<3;i++) {
    const [color,label,desc]=opts[i];
    const yb=226+i*84, sel=(i===opcion);
    const bw=580, bh=70, bx=W/2-bw/2;
    const pulse=sel?Math.abs(Math.round(6*Math.sin(tick/180))):0;
    // shadow
    ctx.fillStyle='rgba(10,10,10,0.5)';
    roundRect(bx+4,yb+4,bw,bh,12); ctx.fill();
    // bg
    if(sel) {
      const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
      ctx.fillStyle=`rgb(${Math.max(0,r-160)},${Math.max(0,g-160)},${Math.max(0,b-160)})`;
    } else ctx.fillStyle='rgba(40,40,55,0.95)';
    roundRect(bx-pulse,yb-pulse/2,bw+pulse*2,bh+pulse,12); ctx.fill();
    // border
    ctx.strokeStyle=sel?color:'#505064'; ctx.lineWidth=sel?3:1;
    roundRect(bx-pulse,yb-pulse/2,bw+pulse*2,bh+pulse,12); ctx.stroke();
    // stars
    for(let si=0;si<3;si++) {
      const sc=si<i+1?color:'#323240';
      ctx.beginPath(); ctx.arc(bx+20+si*22,yb+bh/2,si<i+1?8:6,0,Math.PI*2);
      ctx.fillStyle=sc; ctx.fill();
    }
    // label
    ctx.fillStyle=sel?color:'#a0a0b4'; ctx.font='bold 26px monospace';
    ctx.textAlign='left'; ctx.fillText(label,bx+85,yb+12);
    ctx.fillStyle=sel?'rgba(200,200,220,0.9)':'rgba(140,140,160,0.8)'; ctx.font='13px monospace';
    ctx.fillText(desc,bx+87,yb+44);
    // arrow
    if(sel) {
      const ax=bx-24+Math.round(4*Math.sin(tick/200)), ay=yb+bh/2;
      ctx.fillStyle=color;
      ctx.beginPath(); ctx.moveTo(ax,ay-8); ctx.lineTo(ax+14,ay); ctx.lineTo(ax,ay+8); ctx.closePath(); ctx.fill();
    }
  }
  // settings btn
  ctx.textAlign='center'; ctx.font='15px monospace'; ctx.fillStyle='rgba(180,180,220,0.9)';
  const sTxt=T('settings');
  const sw=ctx.measureText(sTxt).width+20, sx2=W/2-sw/2-80, sy2=H-88;
  roundRect(sx2,sy2-6,sw,26,8); ctx.fillStyle='rgba(40,40,60,0.9)'; ctx.fill();
  ctx.strokeStyle='rgba(100,100,160,0.8)'; ctx.lineWidth=1;
  roundRect(sx2,sy2-6,sw,26,8); ctx.stroke();
  ctx.fillStyle='rgba(180,180,220,0.9)'; ctx.fillText(sTxt,sx2+sw/2,sy2+7);
  ctx.font='11px monospace'; ctx.fillStyle='rgba(100,100,150,0.7)'; ctx.fillText('TAB',sx2-26,sy2+7);
  // shop btn
  const shopTxt='TIENDA / SHOP';
  const shw=ctx.measureText(shopTxt).width+20, shx=W/2+80, shy=H-88;
  ctx.font='15px monospace';
  roundRect(shx,shy-6,shw,26,8); ctx.fillStyle='rgba(40,30,5,0.9)'; ctx.fill();
  ctx.strokeStyle='rgba(180,140,0,0.8)'; ctx.lineWidth=1;
  roundRect(shx,shy-6,shw,26,8); ctx.stroke();
  ctx.fillStyle='#ffd700'; ctx.fillText(shopTxt,shx+shw/2,shy+7);
  ctx.font='11px monospace'; ctx.fillStyle='rgba(160,120,0,0.8)'; ctx.fillText('Q',shx-20,shy+7);
  ctx.font='11px monospace'; ctx.fillStyle='rgba(255,200,0,0.7)'; ctx.fillText(`💰 ${monedasAcumuladas}`,W/2,shy+7);

  // Leaderboard button
  const lbTxt='RANKING GLOBAL';
  ctx.font='15px monospace';
  const lbw=ctx.measureText(lbTxt).width+20, lbx=W/2-lbw/2, lby=H-56;
  roundRect(lbx,lby-6,lbw,26,8); ctx.fillStyle='rgba(5,30,50,0.9)'; ctx.fill();
  ctx.strokeStyle='rgba(0,180,255,0.6)'; ctx.lineWidth=1;
  roundRect(lbx,lby-6,lbw,26,8); ctx.stroke();
  ctx.fillStyle='#00c8ff'; ctx.fillText(lbTxt,lbx+lbw/2,lby+7);
  ctx.font='11px monospace'; ctx.fillStyle='rgba(0,150,200,0.7)'; ctx.fillText('L',lbx-18,lby+7);

  // Player name top-right
  if(nombreJugador) {
    ctx.textAlign='right'; ctx.fillStyle='rgba(200,200,220,0.7)'; ctx.font='13px monospace';
    ctx.fillText(`👤 ${nombreJugador}`,W-12,22);
    ctx.fillStyle='rgba(120,120,150,0.5)'; ctx.font='11px monospace';
    ctx.fillText('(P para cambiar nombre)',W-12,38);
  }

  // Global high score
  if(globalHSNombre) {
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,215,0,0.5)'; ctx.font='12px monospace';
    ctx.fillText(`🌐 Record global: ${globalHSNombre} — ${globalHS}`,W/2,220);
  }

  // instructions
  ctx.fillStyle='rgba(120,120,150,0.8)'; ctx.font='13px monospace'; ctx.textAlign='center';
  ctx.fillText(T('navegar'),W/2,H-34);
  ctx.fillText(T('jugar'),W/2,H-14);
  // decorative coins
  drawMoneda(W/2-13-480,68,tick); drawMoneda(W/2-13+480,68,tick+300);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawSettings(opIdioma, scroll, tick) {
  ctx.fillStyle='#060610'; ctx.fillRect(0,0,W,H);
  const stars=getStars(99,60);
  for(const [sx,sy] of stars) {
    const br=Math.max(0,Math.min(255,Math.round(40+50*Math.sin(tick/700+sx*0.01))));
    ctx.fillStyle=`rgb(${br},${br},${br})`; ctx.fillRect(sx,sy,1,1);
  }
  ctx.fillStyle='#00dcdc'; ctx.font='bold 30px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(T('settings'),W/2,28);
  ctx.strokeStyle='rgba(60,60,100,0.8)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2-200,72); ctx.lineTo(W/2+200,72); ctx.stroke();
  ctx.fillStyle='rgba(160,160,200,0.8)'; ctx.font='16px monospace';
  ctx.fillText(T('idioma'),W/2,82);
  const VISIBLE=7, itemH=54, listW=500, listX=W/2-listW/2, listY=112;
  for(let vi=0;vi<VISIBLE;vi++) {
    const idx=scroll+vi;
    if(idx>=IDIOMAS.length) break;
    const [cod,nombre]=IDIOMAS[idx], sel=(idx===opIdioma), iy=listY+vi*itemH;
    ctx.fillStyle='rgba(10,10,10,0.4)';
    roundRect(listX+3,iy+3,listW,itemH-6,10); ctx.fill();
    ctx.fillStyle=sel?'rgba(50,50,80,0.9)':'rgba(28,28,42,0.9)';
    roundRect(listX,iy,listW,itemH-6,10); ctx.fill();
    ctx.strokeStyle=sel?'#00dcdc':'rgba(60,60,90,0.6)'; ctx.lineWidth=sel?2:1;
    roundRect(listX,iy,listW,itemH-6,10); ctx.stroke();
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle=sel?'#fff':'rgba(160,160,190,0.9)'; ctx.font='16px monospace';
    ctx.fillText(nombre,listX+60,iy+itemH/2-3);
    ctx.fillStyle=sel?'#00dcdc':'rgba(80,80,120,0.8)'; ctx.font='bold 11px monospace';
    ctx.fillText(cod.toUpperCase(),listX+16,iy+itemH/2-3);
    if(sel) {
      ctx.fillStyle='#00dcdc';
      const ax2=listX+listW+14, ay2=iy+itemH/2-8;
      ctx.beginPath(); ctx.moveTo(ax2,ay2); ctx.lineTo(ax2+12,ay2+8); ctx.lineTo(ax2,ay2+16); ctx.closePath(); ctx.fill();
    }
  }
  // scroll arrows
  ctx.fillStyle='rgba(120,120,180,0.8)';

async function supaFetch(path, method='GET', body=null) {

      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,

    if(method === 'POST')  headers['Prefer'] = 'return=representation';

    const opts = { method, headers };
    if(body) opts.body = JSON.stringify(body);

    const r = await fetch(SUPA_URL + '/rest/v1/' + path, opts);

// JOYSTICK (drawn on canvas, touch-driven)
// ─────────────────────────────────────────────────────────────────
const JOY = {
  active: false,
  baseX: 0, baseY: 0,   // center of joystick base (canvas coords)
  stickX: 0, stickY: 0, // current stick position
  dx: 0, dy: 0,         // normalized -1..1
  radius: 55,
  touchId: null,
  startX: 0, startY: 0  // where touch started
};

function canvasCoords(e, touch) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  return [(touch.clientX - rect.left)*scaleX, (touch.clientY - rect.top)*scaleY];
}

// Only activate joystick for touches in the left half of the canvas
const JOY_ZONE_X = 0.45; // left 45% of canvas width

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for(const t of e.changedTouches) {
    const [cx, cy] = canvasCoords(e, t);
    if(cx < W * JOY_ZONE_X) {
      // joystick
      if(!JOY.active) {
        JOY.active  = true;
        JOY.touchId = t.identifier;
        JOY.baseX   = cx; JOY.baseY = cy;
        JOY.stickX  = cx; JOY.stickY = cy;
        JOY.startX  = cx; JOY.startY = cy;
        JOY.dx=0; JOY.dy=0;
      }
    }
  }
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for(const t of e.changedTouches) {
    if(t.identifier === JOY.touchId) {
      const [cx, cy] = canvasCoords(e, t);
      const ddx = cx - JOY.baseX, ddy = cy - JOY.baseY;
      const len = Math.hypot(ddx, ddy) || 1;
      const clamped = Math.min(len, JOY.radius);
      JOY.dx = ddx/len; JOY.dy = ddy/len;
      JOY.stickX = JOY.baseX + JOY.dx * clamped;
      JOY.stickY = JOY.baseY + JOY.dy * clamped;
    }
  }
}, {passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for(const t of e.changedTouches) {
    if(t.identifier === JOY.touchId) {
      JOY.active=false; JOY.touchId=null; JOY.dx=0; JOY.dy=0;
    }
  }
}, {passive:false});

canvas.addEventListener('touchcancel', e => {
  JOY.active=false; JOY.touchId=null; JOY.dx=0; JOY.dy=0;
}, {passive:false});

function drawJoystick(tick) {
  if(!JOY.active) return;
  // base ring
  ctx.beginPath(); ctx.arc(JOY.baseX, JOY.baseY, JOY.radius, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=2; ctx.stroke();
  // inner guide circles
  ctx.beginPath(); ctx.arc(JOY.baseX, JOY.baseY, JOY.radius*0.45, 0, Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1; ctx.stroke();
  // stick
  ctx.beginPath(); ctx.arc(JOY.stickX, JOY.stickY, 26, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.stroke();
  // direction dot
  ctx.beginPath(); ctx.arc(JOY.stickX, JOY.stickY, 8, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
}

function handleKey(code, key) {
  // Admin code detection — works from anywhere, type the digits
  if(key && key.length===1 && key>='0' && key<='9') {
    adminCodeBuffer+=key;
    if(adminCodeBuffer.length>ADMIN_CODE.length) adminCodeBuffer=adminCodeBuffer.slice(-ADMIN_CODE.length);
    if(adminCodeBuffer===ADMIN_CODE) {
      adminMode=!adminMode;
      adminCodeBuffer='';
      efectosPantalla.push({tipo:'flash',timer:500,color:adminMode?[255,215,0]:[150,150,150]});
    }
  }

  // Admin in-game shortcuts
  if(adminMode && !enMenu && !enShop && !enSettings && !gameOver) {
    if(code==='Digit6'||code==='Numpad6') {  // 6 → next world
      mundoActual++; mundoGanado=false; transTimer=0;
      const prevEscudo=estado.jug.escudo, prevVelBase=estado.jug.velBase;
      estado=iniciarMundo(mundoActual,dificultad);
      estado.jug.escudo=prevEscudo; estado.jug.velBase=prevVelBase; estado.jug.vel=prevVelBase;
      spawnTimer=0; enesTotalesSpawn=0; efectosPantalla=[];
      return;
    }
    if(code==='Digit4'||code==='Numpad4') {  // 4 → prev world
      mundoActual=Math.max(1,mundoActual-1); mundoGanado=false; transTimer=0;
      const prevEscudo=estado.jug.escudo, prevVelBase=estado.jug.velBase;
      estado=iniciarMundo(mundoActual,dificultad);
      estado.jug.escudo=prevEscudo; estado.jug.velBase=prevVelBase; estado.jug.vel=prevVelBase;
      spawnTimer=0; enesTotalesSpawn=0; efectosPantalla=[];
      return;
    }
    if(code==='Digit1'||code==='Numpad1') {  // 1 → kill all enemies
      estado.enes=[]; estado.balas=[]; return;
    }
    if(code==='Digit2'||code==='Numpad2') {  // 2 → add 50 coins
      monedasAcumuladas+=50; saveCoins(monedasAcumuladas); return;
    }
    if(code==='Digit3'||code==='Numpad3') {  // 3 → add a life
      vidas=Math.min(vidas+1,99); return;
    }
  }

  if(enShop) {
    const COLS=2, totalRows=Math.ceil(TIENDA_ITEMS.length/COLS);
    const VISIBLE_ROWS=5;
    if(code==='Escape') { enShop=false; return; }
    if(code==='ArrowLeft'||code==='KeyA') shopSel=Math.max(0,shopSel-1);
    else if(code==='ArrowRight'||code==='KeyD') shopSel=Math.min(TIENDA_ITEMS.length-1,shopSel+1);
    else if(code==='ArrowUp'||code==='KeyW') {
      shopSel=Math.max(0,shopSel-COLS);
      const row=Math.floor(shopSel/COLS);
      if(row<shopScroll) shopScroll=row;
    }
    else if(code==='ArrowDown'||code==='KeyS') {
      shopSel=Math.min(TIENDA_ITEMS.length-1,shopSel+COLS);
      const row=Math.floor(shopSel/COLS);
      if(row>=shopScroll+VISIBLE_ROWS) shopScroll=row-VISIBLE_ROWS+1;
    }
    else if(code==='Enter'||code==='Space') {
      const item=TIENDA_ITEMS[shopSel];
      applyPurchase(item);
    }
    return;
  }
  if(enSettings) {
    if(code==='Escape') enSettings=false;
    else if(code==='ArrowUp'||code==='KeyW') { opcionIdioma=Math.max(0,opcionIdioma-1); scrollIdioma=Math.min(scrollIdioma,opcionIdioma); }
    else if(code==='ArrowDown'||code==='KeyS') { opcionIdioma=Math.min(IDIOMAS.length-1,opcionIdioma+1); if(opcionIdioma>=scrollIdioma+7) scrollIdioma=opcionIdioma-6; }
    else if(code==='Enter'||code==='Space') { idioma=IDIOMAS[opcionIdioma][0]; }
    return;
  }
  if(enMenu) {
    if(code==='Tab') { enSettings=true; return; }
    if(code==='KeyQ') { enShop=true; return; }
    if(code==='KeyL') { enLeaderboard=true; fetchLeaderboard(); fetchGlobalHS(); return; }
    if(code==='KeyP') { enNombreScreen=true; nombreInput=nombreJugador; return; }
    if(code==='ArrowUp'||code==='KeyW') opcionMenu=(opcionMenu-1+3)%3;
    else if(code==='ArrowDown'||code==='KeyS') opcionMenu=(opcionMenu+1)%3;
    else if(code==='Enter'||code==='Space') {
      dificultad=['facil','normal','dificil'][opcionMenu];
      mundoActual=1; puntosTotales=0; vidas=3;
      x2CoinsActivo=false; slowmoActivo=0;
      estado=iniciarMundo(mundoActual,dificultad);
      // apply purchased skins/boosts
      const velBoosts=getComprado('veloc');
      estado.jug.velBase=5+velBoosts;
      estado.jug.vel=estado.jug.velBase;
      spawnTimer=0; gameOver=false; mundoGanado=false; transTimer=0;
      enMenu=false; enesTotalesSpawn=0; efectosPantalla=[];
    }
    return;
  }
  if(gameOver) {
    if(code==='KeyR') { enMenu=true; gameOver=false; efectosPantalla=[]; }
    if(code==='Tab')  { enSettings=true; }
    if(code==='KeyQ') { enShop=true; }
    if(code==='KeyL') { enLeaderboard=true; fetchLeaderboard(); fetchGlobalHS(); }
    return;
  }

  // In-game: Escape → return to menu
  if(!enMenu && !gameOver && !mundoGanado) {
    if(code==='Escape') {
      enMenu=true; gameOver=false;
      estado.enes=[]; estado.balas=[]; efectosPantalla=[];
      return;
    }
  }
}
